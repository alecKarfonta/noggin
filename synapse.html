          FX.ring(b.x+b.w/2,b.y+b.h/2,b.col,120,6,0.4);
          this.level=Math.min(this.level+1,8); this.newProblem();
        } else {
          Game.award(false,rt,0); FX.burst(b.x+b.w/2,b.y+b.h/2,COL.magenta,12,200);
          FX.ring(b.x+b.w/2,b.y+b.h/2,COL.magenta,100,5,0.4);
          this.level=Math.max(0,this.level-1); this.newProblem();
        }
        return;
      }
    }
  },
  keyFor(i){ const b=this._boxes&&this._boxes[i]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:null; }
};

/* --- 3. REFLEX (go / no-go) --- */
const Reflex = {
  name:'REFLEX', hint:'Tap on CYAN. Never tap on PINK.',
  domains:['attention'], accent:COL.amber,
  init(){
    this.dailySeed=0;
    const rng = makeRNG(this.dailySeed);
    this.state='idle'; this.t=0.5 + rng()*0.6;
    this.cx=LW/2; this.cy=720; this.r=180; this.shownAt=0; this.flashc=null; this._fl=0;
  },
  update(dt){
    const rng = makeRNG(this.dailySeed);
    this.t-=dt;
    if(this.t<=0){
      if(this.state==='idle'){
        this.state = rng()<0.62 ? 'go':'nogo';
        this.shownAt=now();
        this.t = this.state==='go'? 1.0 : 0.85;
      } else {
        if(this.state==='go'){ Game.award(false,0,0); this.flash(COL.magenta); }
        else { Game.award(true,0,40); this.flash(COL.cyan); }
        this.state='idle'; this.t=0.5 + rng()*0.7;
      }
    }
    if(this._fl>0) this._fl-=dt;
  },
  flash(c){ this.flashc=c; this._fl=0.18; },
  draw(){
    let col = COL.dim, label='WAIT…';
    if(this.state==='go'){ col=COL.cyan; label='TAP!'; }
    else if(this.state==='nogo'){ col=COL.magenta; label='HOLD'; }
    if(this._fl>0) col=this.flashc;
    const t = now()/1000;
    // outer pulsing rings when active
    if(this.state!=='idle'){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      for(let i=0;i<3;i++){
        const phase = (t*0.6 + i/3)%1;
        const rad = this.r + phase*120;
        const a = (1-phase)*0.4;
        ctx.strokeStyle = hexA(col, a);
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(this.cx,this.cy,rad,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
    // idle "breathing" ring
    if(this.state==='idle'){
      const breath = 0.5+0.5*Math.sin(t*2);
      ctx.strokeStyle = hexA(col, 0.25+0.2*breath);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.cx,this.cy,this.r+8+breath*6,0,Math.PI*2); ctx.stroke();
    }
    // glow body
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur= this.state==='idle'?12:55;
    const rg = ctx.createRadialGradient(this.cx,this.cy-this.r*0.3,this.r*0.1, this.cx,this.cy,this.r);
    rg.addColorStop(0, this.state==='idle'? hexA(col,0.30) : mixHex(col,'#ffffff',0.35));
    rg.addColorStop(1, this.state==='idle'? hexA(col,0.10) : hexA(col,0.85));
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(this.cx,this.cy,this.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // glossy highlight
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle = hexA('#ffffff', this.state==='idle'?0.04:0.10);
    ctx.beginPath(); ctx.ellipse(this.cx, this.cy-this.r*0.45, this.r*0.7, this.r*0.25, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    text(label, this.cx, this.cy, 64, this.state==='idle'?COL.muted:'#07111a','center',900);
  },
  down(x,y){
    const rng = makeRNG(this.dailySeed);
    const d=Math.hypot(x-this.cx,y-this.cy);
    if(d>this.r+30) return;
    if(this.state==='go'){
      const rt=now()-this.shownAt;
      Game.award(true,rt,130); FX.burst(this.cx,this.cy,COL.cyan,22,360);
      FX.ring(this.cx,this.cy,COL.cyan,this.r*1.4,8,0.5);
      FX.fireworks(this.cx,this.cy,COL.cyan);
      this.flash(COL.cyan); this.state='idle'; this.t=0.45 + rng()*0.55;
    } else if(this.state==='nogo'){
      Game.award(false,0,0); FX.burst(this.cx,this.cy,COL.magenta,14,220);
      FX.ring(this.cx,this.cy,COL.magenta,this.r*1.2,6,0.45);
      this.flash(COL.magenta); this.state='idle'; this.t=0.6 + rng()*0.6;
    } else {
      Game.award(false,0,0); FX.burst(this.cx,this.cy,COL.magenta,8,150);
      FX.ring(this.cx,this.cy,COL.magenta,this.r,5,0.35);
      this.flash(COL.magenta); this.t=0.6 + rng()*0.6;
    }
  },
  keyFor(i){ if(i===0) return {x:this.cx, y:this.cy}; return null; }
};

/* --- 4. RECALL (memory grid, Simon-style) --- */
const Recall = {
  name:'RECALL', hint:'Watch the pattern, then repeat it',
  domains:['memory'], accent:COL.violet,
  init(){ this.gridN=3; this.len=3; this.dailySeed=0; this.buildGrid(); this.newPattern(); },
  buildGrid(){
    const n=this.gridN, pad=40, area=Math.min(LW-pad*2, 560);
    const gap=18, cell=(area-gap*(n-1))/n;
    const sx=LW/2-area/2, sy=520;
    this.cells=[];
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){
      this.cells.push({x:sx+c*(cell+gap),y:sy+r*(cell+gap),w:cell,h:cell,lit:0});
    }
    this.cell=cell;
  },
  newPattern(){
    const rng = makeRNG(this.dailySeed);
    const ir = (a,b)=> a + Math.floor(rng()*(b-a+1));
    this.seq=[]; for(let i=0;i<this.len;i++) this.seq.push(ir(0,this.cells.length-1));
    this.phase='show'; this.idx=0; this.tt=0.55; this.input=0; this.shownAt=0;
  },
  update(dt){
    for(const c of this.cells) c.lit=Math.max(0,c.lit-dt*3);
    if(this.phase==='show'){
      this.tt-=dt;
      if(this.tt<=0){
        if(this.idx<this.seq.length){
          this.cells[this.seq[this.idx]].lit=1;
          Audio_.blip(400+this.idx*60,0.12,'sine',0.3);
          this.idx++; this.tt=0.5;
        } else { this.phase='input'; this.input=0; this.shownAt=now(); }
      }
    }
  },
  draw(){
    const labelY=470;
    text(this.phase==='show'?'WATCH':'REPEAT', LW/2, labelY, 40,
         this.phase==='show'?COL.amber:COL.cyan,'center',900);
    for(const c of this.cells){
      // glow when lit
      if(c.lit>0.05){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const rg = ctx.createRadialGradient(c.x+c.w/2,c.y+c.h/2,0,c.x+c.w/2,c.y+c.h/2,c.w*0.9);
        rg.addColorStop(0, hexA(COL.cyan, 0.5*c.lit));
        rg.addColorStop(1, hexA(COL.cyan, 0));
        ctx.fillStyle = rg;
        ctx.fillRect(c.x-c.w/2, c.y-c.h/2, c.w*2, c.h*2);
        ctx.restore();
      }
      rr(c.x,c.y,c.w,c.h,16);
      const g = ctx.createLinearGradient(0,c.y,0,c.y+c.h);
      g.addColorStop(0, hexA(COL.cyan, 0.16+0.7*c.lit));
      g.addColorStop(1, hexA(COL.blue, 0.06+0.5*c.lit));
      ctx.fillStyle = g; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=hexA(COL.cyan,0.3+0.5*c.lit); ctx.stroke();
    }
  },
  down(x,y){
    if(this.phase!=='input') return;
    for(let i=0;i<this.cells.length;i++){
      const c=this.cells[i];
      if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h){
        c.lit=1;
        if(i===this.seq[this.input]){
          Audio_.blip(440+this.input*60,0.1,'sine',0.3);
          this.input++;
          if(this.input>=this.seq.length){
            const rt=now()-this.shownAt;
            Game.award(true,rt, 60*this.seq.length);
            FX.burst(LW/2,650,COL.cyan,26,380); FX.bang(COL.cyan);
            this.len=Math.min(this.len+1,8);
            if(this.len>this.gridN*this.gridN-2 && this.gridN<4){ this.gridN++; this.buildGrid(); }
            this.newPattern();
          }
        } else {
          Game.award(false,0,0); FX.burst(c.x+c.w/2,c.y+c.h/2,COL.magenta,12,200);
          this.len=Math.max(3,this.len-1); this.newPattern();
        }
        return;
      }
    }
  },
  keyFor(i){ const c=this.cells&&this.cells[i]; return c?{x:c.x+c.w/2,y:c.y+c.h/2}:null; }
};

/* --- 5. ORDER (tap nodes in ascending order) --- */
const Order = {
  name:'SEQUENCE', hint:'Tap the numbers in ascending order',
  domains:['executive'], accent:COL.blue,
  init(){ this.n=4; this.dailySeed=0; this.newSet(); },
  newSet(){
    const rng = makeRNG(this.dailySeed);
    const rr = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const count=this.n;
    const vals=[]; while(vals.length<count){ const v=rr(2,99); if(!vals.includes(v)) vals.push(v); }
    vals.sort((a,b)=>a-b);
    this.order=vals.slice();
    this.nodes=[];
    const R=70; let tries=0;
    const shuffledVals = vals.slice();
    for(let i=shuffledVals.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [shuffledVals[i],shuffledVals[j]]=[shuffledVals[j],shuffledVals[i]]; }
    for(const v of shuffledVals){
      let nx,ny,ok;
      do{ ok=true; nx=rr(R+30,LW-R-30); ny=rr(470,1080);
          for(const o of this.nodes){ if(Math.hypot(nx-o.x,ny-o.y)<R*2+18){ok=false;break;} }
          tries++; } while(!ok && tries<400);
      this.nodes.push({x:nx,y:ny,v:v,done:false});
    }
    this.next=0; this.shownAt=now();
  },
  update(){},
  draw(){
    text('ascending order', LW/2, 440, 30, COL.muted,'center',600);
    const t = now()/600;
    for(const nd of this.nodes){
      const breath = nd.done? 0 : 0.5+0.5*Math.sin(t + nd.x*0.01);
      // glow
      if(!nd.done){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const rg = ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,90);
        rg.addColorStop(0, hexA(COL.blue, 0.25+0.1*breath));
        rg.addColorStop(1, hexA(COL.blue, 0));
        ctx.fillStyle = rg;
        ctx.fillRect(nd.x-90, nd.y-90, 180, 180);
        ctx.restore();
      }
      ctx.save();
      ctx.shadowColor = nd.done?COL.dim:COL.blue; ctx.shadowBlur = nd.done?0:14;
      const r = 64;
      const g = ctx.createRadialGradient(nd.x, nd.y-r*0.35, r*0.1, nd.x, nd.y, r);
      if(nd.done){
        g.addColorStop(0, hexA(COL.dim,0.55));
        g.addColorStop(1, hexA(COL.dim,0.25));
      } else {
        g.addColorStop(0, mixHex(COL.blue,'#ffffff',0.30));
        g.addColorStop(1, mixHex(COL.blue, COL.void, 0.25));
      }
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(nd.x,nd.y,64,0,Math.PI*2); ctx.fill();
      ctx.restore();
      text(String(nd.v), nd.x, nd.y, 44, nd.done?COL.muted:'#07111a','center',900,MONO);
    }
  },
  down(x,y){
    for(const nd of this.nodes){
      if(nd.done) continue;
      if(Math.hypot(x-nd.x,y-nd.y)<=68){
        if(nd.v===this.order[this.next]){
          nd.done=true; this.next++;
          Audio_.blip(420+this.next*70,0.09,'triangle',0.3);
          FX.burst(nd.x,nd.y,COL.cyan,12,260);
          FX.ring(nd.x,nd.y,COL.cyan,90,5,0.35);
          if(this.next>=this.order.length){
            const rt=now()-this.shownAt;
            Game.award(true,rt,40*this.n); FX.bang(COL.cyan);
            FX.fireworks(LW/2, 700, COL.cyan);
            this.n=Math.min(this.n+1,8); this.newSet();
          }
        } else {
          Game.award(false,0,0); FX.burst(nd.x,nd.y,COL.magenta,12,200);
          FX.ring(nd.x,nd.y,COL.magenta,90,5,0.4);
          this.newSet();
        }
        return;
      }
    }
  },
  keyFor(i){
    // sort nodes by x for stable left-to-right key mapping
    if(!this.nodes) return null;
    const sorted = this.nodes.slice().sort((a,b)=>a.x-b.x);
    const nd = sorted[i];
    return nd?{x:nd.x,y:nd.y}:null;
  }
};

/* --- 6. N-BACK (working memory) --- */
const NBack = {
  name:'N-BACK', hint:'MATCH if the cell matches N steps back',
  domains:['memory'], accent:COL.green,
  init(){
    this.dailySeed=0;
    this.n = 2;                       // start 2-back
    this.level = 0;
    this.gridN = 3;
    this.beat = 0;                    // index into the sequence
    this.seq = [];                    // history of cell indices shown
    this.phase = 'show';              // 'show' | 'wait' | 'fb'
    this.t = 0.0;
    this.beatDur = 1.1;               // seconds per beat
    this.scoredThisBeat = false;
    this.litCell = -1;
    this.fbCell = -1; this.fbCol=null;
    this._buildGrid();
    this._advance();
  },
  _buildGrid(){
    const n=this.gridN, pad=40, area=Math.min(LW-pad*2, 560);
    const gap=18, cell=(area-gap*(n-1))/n;
    const sx=LW/2-area/2, sy=560;
    this.cells=[];
    for(let r=0;r<n;r++)for(let c=0;c<n;c++){
      this.cells.push({x:sx+c*(cell+gap),y:sy+r*(cell+gap),w:cell,h:cell});
    }
    this.cell=cell;
  },
  _advance(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.beat*101 : 0);
    // pick a cell; bias ~30% to be a match (when possible)
    let cell;
    if(this.beat >= this.n && rng() < 0.30){
      cell = this.seq[this.beat - this.n];
    } else {
      cell = Math.floor(rng() * this.cells.length);
      if(this.beat >= this.n && cell === this.seq[this.beat - this.n] && rng()<0.5){
        // avoid accidental back-to-back matches to keep it fair
        cell = (cell + 1) % this.cells.length;
      }
    }
    this.litCell = cell;
    this.seq.push(cell);
    this.phase = 'show';
    this.t = this.beatDur;
    this.scoredThisBeat = false;
    this.shownAt = now();
  },
  update(dt){
    if(this.phase==='fb'){
      this.t -= dt;
      if(this.t<=0){ this._next(); }
      return;
    }
    this.t -= dt;
    if(this.t<=0){
      // beat elapsed without match resolution
      if(this.beat >= this.n && !this.scoredThisBeat){
        const target = this.seq[this.beat - this.n];
        if(this.litCell !== target){
          // correctly withheld
          Game.award(true, now() - this.shownAt, 60);
        } else {
          // missed a match
          Game.award(false, 0, 0);
          this._fb(this.litCell, COL.magenta);
        }
      }
      this._next();
    }
  },
  _next(){
    this.beat++;
    this.litCell = -1;
    // difficulty scaling
    this.level = Game.combo;
    if(this.level >= 8 && this.n < 3) this.n = 3;
    this._advance();
  },
  _fb(cell, col){ this.fbCell = cell; this.fbCol = col; this.phase='fb'; this.t = 0.35; },
  draw(){
    text(this.n+'-BACK', LW/2, 470, 36, COL.cyan,'center',900,'system-ui',2);
    text('beat '+(this.beat+1), LW/2, 506, 22, COL.muted,'center',700,'system-ui',2);
    for(let i=0;i<this.cells.length;i++){
      const c=this.cells[i];
      const lit = (i===this.litCell && this.phase!=='fb');
      const fb  = (i===this.fbCell && this.phase==='fb');
      let col = COL.cyan, alpha = 0.10;
      if(lit){ col = COL.cyan; alpha = 0.92; }
      else if(fb){ col = this.fbCol; alpha = 0.85; }
      // glow when lit/feedback
      if(lit || fb){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const rg = ctx.createRadialGradient(c.x+c.w/2,c.y+c.h/2,0,c.x+c.w/2,c.y+c.h/2,c.w);
        rg.addColorStop(0, hexA(col, 0.5*alpha));
        rg.addColorStop(1, hexA(col, 0));
        ctx.fillStyle = rg;
        ctx.fillRect(c.x-c.w/2, c.y-c.h/2, c.w*2, c.h*2);
        ctx.restore();
      }
      rr(c.x,c.y,c.w,c.h,16);
      const g = ctx.createLinearGradient(0,c.y,0,c.y+c.h);
      g.addColorStop(0, hexA(mixHex(col,'#ffffff',0.3), alpha));
      g.addColorStop(1, hexA(col, alpha*0.7));
      ctx.fillStyle = g; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=hexA(col,0.35); ctx.stroke();
    }
    // MATCH button (glowing)
    const bw=320, bh=110, bx=LW/2-bw/2, by=1020;
    this._matchBtn = {x:bx,y:by,w:bw,h:bh};
    const pulse = 0.5+0.5*Math.sin(now()/280);
    ctx.save();
    ctx.shadowColor = COL.amber; ctx.shadowBlur = 16+12*pulse;
    const bg = ctx.createLinearGradient(0,by,0,by+bh);
    bg.addColorStop(0, mixHex(COL.amber,'#ffffff',0.25));
    bg.addColorStop(1, mixHex(COL.amber,'#1a0e02',0.15));
    rr(bx,by,bw,bh,22); ctx.fillStyle=bg; ctx.fill();
    ctx.restore();
    rr(bx,by,bw,bh,22);
    ctx.lineWidth=1.5; ctx.strokeStyle=hexA('#ffffff',0.2); ctx.stroke();
    text('MATCH', LW/2, by+bh/2, 44, '#1a1206','center',900,'system-ui',2);
  },
  down(x,y){
    if(!this._matchBtn) return;
    if(inBtn(this._matchBtn, x, y)){
      pressAt(this._matchBtn, COL.amber);
      if(this.phase==='fb' || this.scoredThisBeat) return;
      if(this.beat < this.n){
        Game.award(false, 0, 0);
        this._fb(this.litCell, COL.magenta);
        return;
      }
      const target = this.seq[this.beat - this.n];
      if(this.litCell === target){
        Game.award(true, now() - this.shownAt, 130);
        this._fb(this.litCell, COL.cyan);
        FX.burst(this._matchBtn.x+this._matchBtn.w/2, this._matchBtn.y+this._matchBtn.h/2, COL.cyan, 16);
        FX.ring(this._matchBtn.x+this._matchBtn.w/2, this._matchBtn.y+this._matchBtn.h/2, COL.cyan, 130, 6, 0.4);
      } else {
        Game.award(false, 0, 0);
        this._fb(this.litCell, COL.magenta);
        FX.ring(this._matchBtn.x+this._matchBtn.w/2, this._matchBtn.y+this._matchBtn.h/2, COL.magenta, 110, 5, 0.4);
      }
      this.scoredThisBeat = true;
    }
  },
  keyFor(i){
    // single-button game: any digit or the space-already-handled Enter triggers MATCH
    if(i===0 && this._matchBtn) return {x:this._matchBtn.x+this._matchBtn.w/2, y:this._matchBtn.y+this._matchBtn.h/2};
    return null;
  }
};

/* --- 7. SPEED MATCH (processing speed) --- */
const SpeedMatch = {
  name:'SPEED MATCH', hint:'YES if it matches the previous symbol',
  domains:['speed'], accent:COL.cyan,
  init(){
    this.dailySeed=0; this.prev=null; this.idx=0;
    this.show(null); // first symbol, no prior
  },
  symbols:['▲','●','■','◆','★','✚'],
  _pick(rng){
    const arr = this.symbols;
    return arr[Math.floor(rng()*arr.length)];
  },
  show(prev){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.idx*7 : 0);
    let s = this._pick(rng);
    // ~50% match rate when there is a prev
    if(prev && rng()<0.5) s = prev;
    this.target = s;
    this.shownAt = now();
    this.idx++;
  },
  update(){},
  draw(){
    // big symbol with glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.font = `900 240px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = hexA(COL.cyan, 0.25);
    for(let r=0;r<3;r++) ctx.fillText(this.target, LW/2, 620);
    ctx.restore();
    text(this.target, LW/2, 620, 240, COL.mist,'center',900,'system-ui');

    // YES / NO buttons
    const bw=300, bh=120, gap=24;
    const sx=LW/2-(bw*2+gap)/2, sy=880;
    this._yesBtn = {x:sx, y:sy, w:bw, h:bh};
    this._noBtn  = {x:sx+bw+gap, y:sy, w:bw, h:bh};
    // YES (green)
    const gp = ctx.createLinearGradient(0,sy,0,sy+bh);
    gp.addColorStop(0, mixHex(COL.green,'#ffffff',0.25));
    gp.addColorStop(1, mixHex(COL.green, COL.void, 0.2));
    ctx.save(); ctx.shadowColor=COL.green; ctx.shadowBlur=16;
    rr(sx,sy,bw,bh,22); ctx.fillStyle=gp; ctx.fill(); ctx.restore();
    rr(sx,sy,bw,bh,22); ctx.lineWidth=1.5; ctx.strokeStyle=hexA('#ffffff',0.2); ctx.stroke();
    text('YES ✓', sx+bw/2, sy+bh/2, 48, '#06121a','center',900,'system-ui',2);
    // NO (magenta)
    const mp = ctx.createLinearGradient(0,sy,0,sy+bh);
    mp.addColorStop(0, mixHex(COL.magenta,'#ffffff',0.25));
    mp.addColorStop(1, mixHex(COL.magenta, COL.void, 0.2));
    ctx.save(); ctx.shadowColor=COL.magenta; ctx.shadowBlur=16;
    rr(sx+bw+gap,sy,bw,bh,22); ctx.fillStyle=mp; ctx.fill(); ctx.restore();
    rr(sx+bw+gap,sy,bw,bh,22); ctx.lineWidth=1.5; ctx.strokeStyle=hexA('#ffffff',0.2); ctx.stroke();
    text('NO ✕', sx+bw+gap+bw/2, sy+bh/2, 48, '#1a0612','center',900,'system-ui',2);
  },
  down(x,y){
    if(!this._yesBtn) return;
    const isMatch = (this.prev===this.target);
    let choseMatch = null;
    if(inBtn(this._yesBtn,x,y)){ choseMatch = true; pressAt(this._yesBtn, COL.green); }
    else if(inBtn(this._noBtn,x,y)){ choseMatch = false; pressAt(this._noBtn, COL.magenta); }
    else return;
    const rt = now() - this.shownAt;
    if(choseMatch === isMatch){
      Game.award(true, rt, 110);
      const cx = choseMatch? this._yesBtn.x+this._yesBtn.w/2 : this._noBtn.x+this._noBtn.w/2;
      const cy = this._yesBtn.y+this._yesBtn.h/2;
      FX.burst(cx, cy, COL.cyan, 16);
      FX.ring(cx, cy, COL.cyan, 110, 6, 0.4);
    } else {
      Game.award(false, rt, 0);
      const cx = choseMatch? this._yesBtn.x+this._yesBtn.w/2 : this._noBtn.x+this._noBtn.w/2;
      const cy = this._yesBtn.y+this._yesBtn.h/2;
      FX.burst(cx, cy, COL.magenta, 12, 200);
      FX.ring(cx, cy, COL.magenta, 100, 5, 0.4);
    }
    this.prev = this.target;
    this.show(this.prev);
  },
  keyFor(i){
    // YES=1, NO=2
    if(i===0 && this._yesBtn) return {x:this._yesBtn.x+this._yesBtn.w/2, y:this._yesBtn.y+this._yesBtn.h/2};
    if(i===1 && this._noBtn)  return {x:this._noBtn.x+this._noBtn.w/2,   y:this._noBtn.y+this._noBtn.h/2};
    return null;
  }
};

/* --- 8. PATTERN LOGIC (reasoning, Raven's-style matrix) --- */
const PatternLogic = {
  name:'PATTERN', hint:'Pick the tile that completes the pattern',
  domains:['reasoning'], accent:COL.violet,
  init(){ this.dailySeed=0; this.level=0; this.newProblem(); },
  newProblem(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.level*131 : 0);
    const ir = (a,b)=> a + Math.floor(rng()*(b-a+1));
    // Rule type: 0=count progression, 1=rotation, 2=color cycle
    const rule = ir(0,2);
    const colors = [COL.cyan, COL.magenta, COL.amber, COL.green, COL.blue, COL.violet];
    const shapes = ['▲','●','■','◆','★'];
    // generate 8 cells (3x3 with last missing)
    const cells = [];
    for(let i=0;i<8;i++){
      const row = Math.floor(i/3), col = i%3;
      let shape, color, n;
      if(rule===0){
        n = 1 + col; shape = shapes[row % shapes.length]; color = colors[ir(0,colors.length-1)];
      } else if(rule===1){
        shape = shapes[ir(0,shapes.length-1)]; color = colors[col % colors.length]; n=1;
      } else {
        shape = shapes[col % shapes.length]; color = colors[(row+col) % colors.length]; n=1;
      }
      cells.push({shape, color, n});
    }
    // compute the answer (cell 9) by extrapolating the rule along row 3
    const col = 2; // missing is at row=2,col=2
    let ans;
    if(rule===0){
      ans = {shape: shapes[2 % shapes.length], color: cells[7].color, n: 3};
    } else if(rule===1){
      ans = {shape: cells[7].shape, color: colors[2 % colors.length], n:1};
    } else {
      ans = {shape: shapes[2 % shapes.length], color: colors[(2+col) % colors.length], n:1};
    }
    this.cells = cells; this.ans = ans;
    // build 4 options: the answer + 3 distractors
    const opts = [ans];
    while(opts.length<4){
      const sh = shapes[ir(0,shapes.length-1)];
      const co = colors[ir(0,colors.length-1)];
      const n = ir(1,3);
      const cand = {shape:sh, color:co, n};
      if(!opts.some(o=>o.shape===cand.shape && o.color===cand.color && o.n===cand.n)) opts.push(cand);
    }
    // shuffle
    for(let i=opts.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    this.options = opts;
    this.shownAt = now();
  },
  update(){},
  _drawTile(cx, cy, sz, t, highlight){
    panel(cx-sz/2, cy-sz/2, sz, sz, 14, {
      fill0: t? COL.blue : COL.dim, fill1: COL.void, fillA: t? 0.35 : 0.2,
      stroke: highlight || (t? t.color : COL.dim), strokeA: t? 0.6 : 0.3,
      glow: t? 10 : 0, glowCol: t? t.color : COL.blue
    });
    if(t){
      // glow behind symbol
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.font = `900 ${sz*0.42}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hexA(t.color, 0.3);
      for(let r=0;r<2;r++) ctx.fillText(t.shape, cx, cy);
      ctx.restore();
      text(t.shape, cx, cy, sz*0.42, t.color,'center',900,'system-ui');
      // count dots if n>1
      if(t.n>1){
        for(let k=0;k<t.n;k++){
          ctx.fillStyle = hexA(t.color, 0.85);
          ctx.beginPath(); ctx.arc(cx - (t.n-1)*6 + k*12, cy+sz*0.28, 3, 0, Math.PI*2); ctx.fill();
        }
      }
    } else {
      text('?', cx, cy, sz*0.42, COL.muted,'center',800);
    }
  },
  draw(){
    text('complete the pattern', LW/2, 380, 26, COL.muted,'center',600);
    // 3x3 grid, last cell is "?"
    const cellSz=150, gap=14, totalW=3*cellSz+2*gap;
    const sx=LW/2-totalW/2, sy=420;
    for(let i=0;i<9;i++){
      const r=Math.floor(i/3), c=i%3;
      const cx = sx + c*(cellSz+gap) + cellSz/2;
      const cy = sy + r*(cellSz+gap) + cellSz/2;
      if(i<8) this._drawTile(cx, cy, cellSz, this.cells[i]);
      else this._drawTile(cx, cy, cellSz, null);
    }
    // options — sized to fit canvas width
    const bw=152, bh=152, gap2=14;
    const totalW2=4*bw+3*gap2;
    const sx2=LW/2-totalW2/2, sy2=970;
    this._optBoxes=[];
    for(let i=0;i<4;i++){
      const x=sx2+i*(bw+gap2);
      this._optBoxes.push({x, y:sy2, w:bw, h:bh, val:this.options[i]});
      this._drawTile(x+bw/2, sy2+bh/2, bw, this.options[i]);
    }
  },
  down(x,y){
    if(!this._optBoxes) return;
    for(const b of this._optBoxes){
      if(inBtn(b,x,y)){
        const rt = now()-this.shownAt;
        const t = b.val;
        const correct = (t.shape===this.ans.shape && t.color===this.ans.color && t.n===this.ans.n);
        pressAt(b, t.color);
        if(correct){
          Game.award(true, rt, 140);
          FX.burst(b.x+b.w/2, b.y+b.h/2, COL.cyan, 18);
          FX.ring(b.x+b.w/2, b.y+b.h/2, COL.cyan, 130, 6, 0.4);
          this.level = Math.min(this.level+1, 8);
        } else {
          Game.award(false, rt, 0);
          FX.burst(b.x+b.w/2, b.y+b.h/2, COL.magenta, 12, 200);
          FX.ring(b.x+b.w/2, b.y+b.h/2, COL.magenta, 100, 5, 0.4);
          this.level = Math.max(0, this.level-1);
        }
        this.newProblem();
        return;
      }
    }
  },
  keyFor(i){ const b=this._optBoxes&&this._optBoxes[i]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:null; }
};

/* --- 9. VISUAL SEARCH (selective attention, cancellation) --- */
const VisualSearch = {
  name:'VISUAL SEARCH', hint:'Tap every TARGET shape',
  domains:['attention'], accent:COL.amber,
  init(){
    this.dailySeed=0; this.newSet();
  },
  newSet(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.solved*97 : 0);
    const ir = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const shapes=['▲','●','■','◆','★'];
    const colors=[COL.cyan, COL.magenta, COL.amber, COL.green];
    this.targetShape = shapes[ir(0,shapes.length-1)];
    this.targetColor = colors[ir(0,colors.length-1)];
    // ~40 items, ~6 of which are targets
    this.items=[]; const N=40; const targets=6;
    // distractor pools that EXCLUDE the target's shape / color respectively
    const otherShapes = shapes.filter(s=>s!==this.targetShape);
    const otherColors = colors.filter(c=>c!==this.targetColor);
    for(let i=0;i<N;i++){
      const isTarget = i<targets;
      let sh, co;
      if(isTarget){ sh=this.targetShape; co=this.targetColor; }
      else {
        // A distractor must differ from the target on shape OR color.
        // To make some near-misses (harder), occasionally share the shape but use a non-target color,
        // and occasionally share the color with a non-target shape.
        const roll = (i % 3); // deterministic spread of difficulty
        if(roll===0){ sh = otherShapes[ir(0,otherShapes.length-1)]; co = otherColors[ir(0,otherColors.length-1)]; }
        else if(roll===1){ sh = this.targetShape; co = otherColors[ir(0,otherColors.length-1)]; } // same shape, diff color (near-miss)
        else { sh = otherShapes[ir(0,otherShapes.length-1)]; co = this.targetColor; } // same color, diff shape (near-miss)
      }
      this.items.push({shape:sh, color:co, done:false, isTarget});
    }
    // shuffle positions on a jittered grid
    for(let i=this.items.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [this.items[i],this.items[j]]=[this.items[j],this.items[i]]; }
    const cols=5, rows=8, cw=LW/cols, ch=82;
    const startY=480;
    this.items.forEach((it,i)=>{
      const r=Math.floor(i/cols), c=i%cols;
      it.x = c*cw + cw/2 + (rng()-0.5)*14;
      it.y = startY + r*(ch) + (rng()-0.5)*10;
      it.sz = 30 + rng()*4;
    });
    this.left = targets;
    this.shownAt = now();
    this.solved = (this.solved||0);
  },
  update(){},
  draw(){
    // target prompt
    panel(60, 380, LW-120, 70, 16, {fill0:COL.blue,fill1:COL.void,fillA:0.25,stroke:COL.blue,strokeA:0.4,glow:0});
    text('TARGET', 110, 415, 18, COL.muted,'left',700,'system-ui',2);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.font = `900 44px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = hexA(this.targetColor, 0.3);
    for(let r=0;r<2;r++) ctx.fillText(this.targetShape, 200, 415);
    ctx.restore();
    text(this.targetShape, 200, 415, 44, this.targetColor,'center',900,'system-ui');
    text('find all  '+this.left+'  remaining', LW-110, 415, 22, COL.mist,'right',700,'system-ui',1);

    for(const it of this.items){
      if(it.done) continue;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.font = `900 ${it.sz}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hexA(it.color, 0.22);
      ctx.fillText(it.shape, it.x, it.y);
      ctx.restore();
      text(it.shape, it.x, it.y, it.sz, it.color,'center',900,'system-ui');
    }
  },
  down(x,y){
    // pick topmost item under tap
    let hit=null;
    for(let i=this.items.length-1;i>=0;i--){
      const it=this.items[i];
      if(it.done) continue;
      if(Math.hypot(x-it.x, y-it.y) < it.sz*0.7){ hit=it; break; }
    }
    if(!hit) return;
    hit.done=true;
    if(hit.isTarget){
      FX.burst(hit.x, hit.y, COL.cyan, 14);
      FX.ring(hit.x, hit.y, COL.cyan, 60, 4, 0.3);
      this.left--;
      if(this.left<=0){
        const rt = now() - this.shownAt;
        Game.award(true, rt, 60);
        FX.fireworks(LW/2, 700, COL.cyan);
        this.solved++;
        this.newSet();
      } else {
        Game.award(true, 0, 30);
      }
    } else {
      Game.award(false, 0, 0);
      FX.burst(hit.x, hit.y, COL.magenta, 12, 200);
      FX.ring(hit.x, hit.y, COL.magenta, 60, 4, 0.35);
    }
  }
};

/* --- 10. TRAIL (executive function, Trails B analog) --- */
const Trail = {
  name:'TRAIL', hint:'Connect in order: 1, A, 2, B, 3, C…',
  domains:['executive'], accent:COL.green,
  init(){
    this.dailySeed=0; this.level=0; this.newSet();
  },
  newSet(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.level*53 : 0);
    const ir = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const nums = ['1','2','3','4','5','6'];
    const lets = ['A','B','C','D','E','F'];
    const pairs = Math.min(3 + Math.floor(this.level/2), 5); // 3..5 pairs
    this.order = [];
    for(let i=0;i<pairs;i++){ this.order.push({label:nums[i], kind:'n', step:this.order.length}); this.order.push({label:lets[i], kind:'l', step:this.order.length}); }
    // shuffle positions
    const placed=[];
    this.nodes = this.order.map(o=>{
      let x,y,ok,tries=0;
      do {
        ok=true;
        x = ir(120, LW-120); y = ir(480, 1080);
        for(const p of placed){ if(Math.hypot(x-p.x,y-p.y)<150){ ok=false; break; } }
        tries++;
      } while(!ok && tries<200);
      placed.push({x,y});
      return {x,y,label:o.label, kind:o.kind, step:o.step, done:false};
    });
    this.next = 0;
    this.shownAt = now();
  },
  update(){},
  draw(){
    text('connect: number → letter → number…', LW/2, 410, 24, COL.muted,'center',600,'system-ui',1);
    // draw connecting trail through done nodes
    const doneNodes = this.nodes.filter(n=>n.done).sort((a,b)=>a.step-b.step);
    if(doneNodes.length>0){
      ctx.save();
      ctx.strokeStyle = hexA(COL.cyan, 0.6); ctx.lineWidth=3; ctx.lineCap='round';
      ctx.shadowColor = COL.cyan; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(doneNodes[0].x, doneNodes[0].y);
      for(let i=1;i<doneNodes.length;i++) ctx.lineTo(doneNodes[i].x, doneNodes[i].y);
      ctx.stroke();
      ctx.restore();
    }
    // next-target pulse hint
    const target = this.nodes.find(n=>n.step===this.next);
    for(const nd of this.nodes){
      const isNext = (nd===target);
      const breath = isNext? (0.5+0.5*Math.sin(now()/180)) : 0;
      if(isNext){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const rg = ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,90);
        rg.addColorStop(0, hexA(COL.amber, 0.3+0.15*breath));
        rg.addColorStop(1, hexA(COL.amber, 0));
        ctx.fillStyle = rg;
        ctx.fillRect(nd.x-90, nd.y-90, 180, 180);
        ctx.restore();
      }
      const r = 56;
      const col = nd.kind==='n'? COL.blue : COL.magenta;
      ctx.save();
      ctx.shadowColor = nd.done? COL.dim : col; ctx.shadowBlur = nd.done?0:(isNext?16:8);
      const g = ctx.createRadialGradient(nd.x, nd.y-r*0.35, r*0.1, nd.x, nd.y, r);
      if(nd.done){
        g.addColorStop(0, hexA(COL.dim,0.5)); g.addColorStop(1, hexA(COL.dim,0.2));
      } else {
        g.addColorStop(0, mixHex(col,'#ffffff',0.3)); g.addColorStop(1, mixHex(col, COL.void, 0.2));
      }
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(nd.x,nd.y,r,0,Math.PI*2); ctx.fill();
      ctx.restore();
      text(nd.label, nd.x, nd.y, 36, nd.done?COL.muted:'#07111a','center',900,MONO);
    }
  },
  down(x,y){
    for(const nd of this.nodes){
      if(Math.hypot(x-nd.x, y-nd.y) <= 58){
        if(nd.step === this.next){
          nd.done=true; this.next++;
          FX.burst(nd.x, nd.y, COL.cyan, 12, 260);
          FX.ring(nd.x, nd.y, COL.cyan, 80, 4, 0.3);
          Audio_.blip(440 + this.next*60, 0.09, 'triangle', 0.28);
          if(this.next >= this.nodes.length){
            const rt = now() - this.shownAt;
            Game.award(true, rt, 30*this.nodes.length);
            FX.fireworks(LW/2, 700, COL.cyan);
            this.level = Math.min(this.level+1, 6);
            this.newSet();
          }
        } else {
          Game.award(false, 0, 0);
          FX.burst(nd.x, nd.y, COL.magenta, 10, 200);
          FX.ring(nd.x, nd.y, COL.magenta, 70, 4, 0.35);
        }
        return;
      }
    }
  }
};

/* --- 11. WORD WEB (verbal fluency, category membership) --- */
const WordWeb = {
  name:'WORD WEB', hint:'Tap the 2 words that belong to the category',
  domains:['language'], accent:COL.pink,
  // Each category: [NAME, [3 genuine members]]
  cats:[
    ['ANIMALS',   ['DOG','WHALE','EAGLE']],
    ['FRUITS',    ['APPLE','BANANA','PLUM']],
    ['VEHICLES',  ['CAR','TRAIN','BOAT']],
    ['COLORS',    ['RED','BLUE','YELLOW']],
    ['COUNTRIES', ['FRANCE','JAPAN','BRAZIL']],
    ['SPORTS',    ['TENNIS','GOLF','SOCCER']],
    ['JOBS',      ['BAKER','NURSE','PILOT']],
    ['INSTRUMENTS',['PIANO','DRUMS','FLUTE']]
  ],
  // Pool of non-member words used as intruders (never overlap with any member above)
  intruders:['CHAIR','ROCK','CLOUD','BRICK','TOWEL','LAMP','SILENCE','TUESDAY','SYRUP','PEBBLE','VELVET','THUNDER','MUDDLE','GRAVEL','POCKET','BUTTON','SHADOW','RIBBON'],
  init(){ this.dailySeed=0; this.level=0; this.newProblem(); },
  newProblem(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.level*17 : 0);
    const ir = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const cat = this.cats[ir(0,this.cats.length-1)];
    this.catName = cat[0];
    const members = cat[1].slice();
    // pick 2 of the 3 members to show as correct; the 3rd just doesn't appear
    const chosenMembers = [];
    const ms = members.slice();
    while(chosenMembers.length<2){ const idx=ir(0,ms.length-1); chosenMembers.push(ms.splice(idx,1)[0]); }
    // pick 4 intruders from the shared pool (guaranteed non-members)
    const intruderPool = this.intruders.filter(w=>!members.includes(w));
    const chosenIntruders = [];
    const ip = intruderPool.slice();
    while(chosenIntruders.length<4 && ip.length){
      const idx=ir(0,ip.length-1); chosenIntruders.push(ip.splice(idx,1)[0]);
    }
    this.correct = {}; chosenMembers.forEach(w=>this.correct[w]=true);
    const opts = chosenMembers.concat(chosenIntruders);
    for(let i=opts.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    this.options = opts;
    this.tapped = {};
    this.shownAt = now();
  },
  update(){},
  draw(){
    // category prompt with glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.font = `900 56px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = hexA(COL.pink, 0.25);
    for(let r=0;r<3;r++) ctx.fillText(this.catName, LW/2, 430);
    ctx.restore();
    text(this.catName, LW/2, 430, 56, COL.pink,'center',900,'system-ui',3);
    const found = Object.keys(this.tapped).filter(w=>this.correct[w]).length;
    text('find '+found+'/2 belonging', LW/2, 480, 24, COL.muted,'center',700,'system-ui',2);

    // word tiles in a 2-col grid
    const cols=2, bw=300, bh=86, gap=18;
    const totalW=cols*bw+(cols-1)*gap;
    const sx=LW/2-totalW/2, sy=540;
    this._boxes=[];
    this.options.forEach((w,i)=>{
      const x=sx+(i%cols)*(bw+gap), y=sy+Math.floor(i/cols)*(bh+gap);
      this._boxes.push({x,y,w:bw,h:bh,word:w});
      const tapped = !!this.tapped[w];
      const fillCol = tapped ? (this.correct[w]?COL.green:COL.magenta) : COL.blue;
      panel(x,y,bw,bh,16,{fill0:fillCol,fill1:COL.void,fillA:tapped?0.5:0.3,stroke:fillCol,strokeA:tapped?0.7:0.4,glow:tapped?12:0,glowCol:fillCol});
      text(w, x+bw/2, y+bh/2, 32, COL.mist,'center',800,'system-ui',1);
    });
  },
  down(x,y){
    if(!this._boxes) return;
    for(const b of this._boxes){
      if(inBtn(b,x,y) && !this.tapped[b.word]){
        this.tapped[b.word]=true;
        pressAt(b, COL.blue);
        const cx=b.x+b.w/2, cy=b.y+b.h/2;
        if(this.correct[b.word]){
          FX.burst(cx, cy, COL.green, 12);
          FX.ring(cx, cy, COL.green, 100, 5, 0.4);
        } else {
          Game.award(false, 0, 0);
          FX.burst(cx, cy, COL.magenta, 12, 200);
          FX.ring(cx, cy, COL.magenta, 100, 5, 0.4);
        }
        // count how many correct members tapped
        const correctTapped = Object.keys(this.tapped).filter(w=>this.correct[w]).length;
        if(correctTapped >= 2){
          // award only if no wrong taps; otherwise already penalized
          const wrongTapped = Object.keys(this.tapped).filter(w=>!this.correct[w]).length;
          if(wrongTapped===0){
            const rt = now() - this.shownAt;
            Game.award(true, rt, 130);
            FX.fireworks(LW/2, 700, COL.green);
          }
          this.level = Math.min(this.level+1, 8);
          this.newProblem();
        }
        return;
      }
    }
  },
  keyFor(i){ const b=this._boxes&&this._boxes[i]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:null; }
};

/* --- 12. SPIN CODE (associative memory, symbol-digit coding) --- */
const SpinCode = {
  name:'SPIN CODE', hint:'Match each symbol to its digit using the key',
  domains:['memory'], accent:COL.cyan,
  symbols:['▲','●','■','◆','★','✚'],
  init(){
    this.dailySeed=0; this.streak=0; this.newKey(); this.newSymbol();
  },
  newKey(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + 1000 : 0);
    // assign 6 symbols → digits 1-6
    const syms = this.symbols.slice();
    for(let i=syms.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [syms[i],syms[j]]=[syms[j],syms[i]]; }
    this.key = {}; // symbol → digit
    const digits=[1,2,3,4,5,6];
    const dd = digits.slice();
    for(let i=dd.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [dd[i],dd[j]]=[dd[j],dd[i]]; }
    syms.forEach((s,i)=>{ this.key[s] = dd[i]; });
    this.revKey = {}; // digit → symbol
    for(const s in this.key) this.revKey[this.key[s]] = s;
    this.keyChangedAt = now();
  },
  newSymbol(){
    const rng = makeRNG(this.dailySeed ? this.dailySeed + this.streak*23 + 5000 : 0);
    this.targetSym = this.symbols[Math.floor(rng()*this.symbols.length)];
    this.targetDigit = this.key[this.targetSym];
    // build 4 digit options
    const opts = new Set([this.targetDigit]);
    while(opts.size<4){
      const d = 1 + Math.floor(rng()*6);
      opts.add(d);
    }
    this.opts = [...opts];
    for(let i=this.opts.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [this.opts[i],this.opts[j]]=[this.opts[j],this.opts[i]]; }
    this.shownAt = now();
  },
  update(){},
  draw(){
    // key strip at top
    text('KEY', 80, 410, 18, COL.muted,'left',700,'system-ui',2);
    const kw=92, kh=64, kgap=8;
    const kTotal = 6*kw + 5*kgap;
    const ksx = LW/2 - kTotal/2;
    let i=0;
    for(const s of this.symbols){
      const x = ksx + i*(kw+kgap), y=440;
      panel(x,y,kw,kh,12,{fill0:COL.blue,fill1:COL.void,fillA:0.3,stroke:COL.blue,strokeA:0.4,glow:0});
      text(s, x+kw*0.32, y+kh/2, 30, COL.mist,'center',900,'system-ui');
      text(String(this.key[s]), x+kw*0.72, y+kh/2, 26, COL.cyan,'center',900,MONO);
      i++;
    }

    // big symbol to match
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.font = `900 200px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = hexA(COL.cyan, 0.22);
    for(let r=0;r<3;r++) ctx.fillText(this.targetSym, LW/2, 640);
    ctx.restore();
    text(this.targetSym, LW/2, 640, 200, COL.mist,'center',900,'system-ui');

    text('which digit?', LW/2, 770, 24, COL.muted,'center',600,'system-ui',2);

    // 4 digit options
    const bw=140, bh=140, gap=16;
    const totalW=4*bw+3*gap;
    const sx=LW/2-totalW/2, sy=820;
    this._boxes=[];
    for(let i=0;i<4;i++){
      const x=sx+i*(bw+gap);
      this._boxes.push({x,y:sy,w:bw,h:bh,val:this.opts[i]});
      panel(x,sy,bw,bh,18,{fill0:COL.blue,fill1:COL.void,fillA:0.4,stroke:COL.cyan,strokeA:0.5,glow:10,glowCol:COL.cyan});
      text(String(this.opts[i]), x+bw/2, sy+bh/2, 64, COL.mist,'center',900,MONO);
    }
  },
  down(x,y){
    if(!this._boxes) return;
    for(const b of this._boxes){
      if(inBtn(b,x,y)){
        const rt = now()-this.shownAt;
        pressAt(b, COL.cyan);
        if(b.val===this.targetDigit){
          Game.award(true, rt, 110);
          FX.burst(b.x+b.w/2, b.y+b.h/2, COL.cyan, 14);
          FX.ring(b.x+b.w/2, b.y+b.h/2, COL.cyan, 110, 5, 0.4);
          this.streak++;
          // swap key every 5 correct
          if(this.streak % 5 === 0){ this.newKey(); }
          this.newSymbol();
        } else {
          Game.award(false, rt, 0);
          FX.burst(b.x+b.w/2, b.y+b.h/2, COL.magenta, 12, 200);
          FX.ring(b.x+b.w/2, b.y+b.h/2, COL.magenta, 100, 5, 0.4);
        }
        return;
      }
    }
  },
  keyFor(i){ const b=this._boxes&&this._boxes[i]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:null; }
};

const GAMES = [MathRush, ColorClash, Reflex, Recall, Order, NBack, SpeedMatch, PatternLogic, VisualSearch, Trail, WordWeb, SpinCode];

/* daily deterministic 5-of-N selection */
function pickDailyGames(rounds){
  const seedNum = dailySeedNum(0);
  const rng = mulberry32(seedNum ^ 0x9E3779B1 >>> 0);
  const pool = GAMES.slice();
  // Fisher-Yates with seeded RNG
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const games = pool.slice(0, Math.min(rounds, pool.length));
  return { games, seed: seedNum };
}

/* "Noggin" wordmark: vertical gradient + animated glow sweep behind it. */
function drawWordmark(x, y, size){
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `900 ${size}px system-ui,sans-serif`;
  const w = ctx.measureText('Noggin').width;
  // glow halo (additive, breathing)
  const breath = 0.5+0.5*Math.sin(now()/600);
  ctx.globalCompositeOperation='lighter';
  const rg = ctx.createRadialGradient(x, y, 0, x, y, w*0.9);
  rg.addColorStop(0, hexA(COL.cyan, 0.22+0.12*breath));
  rg.addColorStop(1, hexA(COL.cyan, 0));
  ctx.fillStyle = rg;
  ctx.fillRect(x-w, y-size, w*2, size*2);
  // moving glow sweep across letters
  const sweep = (now()/2200)%1;
  const sx = x - w/2 + w*sweep;
  const sg = ctx.createLinearGradient(sx-60,0,sx+60,0);
  sg.addColorStop(0, hexA('#ffffff',0));
  sg.addColorStop(0.5, hexA('#ffffff',0.5));
  sg.addColorStop(1, hexA('#ffffff',0));
  ctx.fillStyle = sg;
  ctx.save();
  ctx.beginPath(); ctx.rect(x-w/2, y-size/2, w, size*1.1); ctx.clip();
  ctx.fillText('Noggin', x, y);
  ctx.restore();
  ctx.restore();
  // base gradient letters (clipped)
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `900 ${size}px system-ui,sans-serif`;
  const lg = ctx.createLinearGradient(0, y-size/2, 0, y+size/2);
  lg.addColorStop(0, '#ffffff');
  lg.addColorStop(0.5, COL.mist);
  lg.addColorStop(1, mixHex(COL.cyan, COL.mist, 0.4));
  ctx.fillStyle = lg;
  ctx.fillText('Noggin', x, y);
  ctx.restore();
}

/* Sparkline of recent daily indices. */
function drawSparkline(x, y, w, h, values, col){
  if(!values || values.length<2){
    return;
  }
  const min = Math.min(...values), max = Math.max(...values);
  const span = Math.max(1, max-min);
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h); ctx.clip();
  // fill under line
  ctx.beginPath();
  values.forEach((v,i)=>{
    const px = x + (i/(values.length-1))*w;
    const py = y + h - ((v-min)/span)*h;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.lineTo(x+w, y+h); ctx.lineTo(x, y+h); ctx.closePath();
  const fg = ctx.createLinearGradient(0,y,0,y+h);
  fg.addColorStop(0, hexA(col,0.30));
  fg.addColorStop(1, hexA(col,0));
  ctx.fillStyle = fg; ctx.fill();
  // line
  ctx.beginPath();
  values.forEach((v,i)=>{
    const px = x + (i/(values.length-1))*w;
    const py = y + h - ((v-min)/span)*h;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.lineJoin='round';
  ctx.shadowColor = col; ctx.shadowBlur = 6;
  ctx.stroke();
  // end dot
  const lastX = x + w, lastY = y + h - ((values[values.length-1]-min)/span)*h;
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(lastX, lastY, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* Brain Profile radar: 6-axis polygon showing cognitive domain strengths. */
const RADAR_AXES = [
  {key:'memory',    label:'MEM', color:COL.violet},
  {key:'attention', label:'ATT', color:COL.amber},
  {key:'speed',     label:'SPD', color:COL.cyan},
  {key:'reasoning', label:'REA', color:COL.magenta},
  {key:'language',  label:'LAN', color:COL.pink},
  {key:'executive', label:'EXE', color:COL.blue}
];
function drawRadar(cx, cy, r, profile, maxV){
  const n = RADAR_AXES.length;
  const norm = maxV>0 ? r/Math.max(maxV,1) : r/100;
  // background rings
  ctx.save();
  ctx.lineWidth = 1;
  for(let ring=1; ring<=3; ring++){
    const rr_ = r*ring/3;
    ctx.strokeStyle = hexA(COL.dim, 0.3);
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a = -Math.PI/2 + (i/n)*Math.PI*2;
      const px = cx + Math.cos(a)*rr_, py = cy + Math.sin(a)*rr_;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.stroke();
  }
  // spokes
  ctx.strokeStyle = hexA(COL.dim, 0.25);
  for(let i=0;i<n;i++){
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r); ctx.stroke();
  }
  ctx.restore();
  // filled polygon
  ctx.save();
  const animIn = clamp((Game.resultT-0.3)/0.8, 0, 1);
  const easeIn = easeOutBack(animIn);
  ctx.globalAlpha = clamp(animIn,0,1);
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    const v = (profile[RADAR_AXES[i].key]||0) * norm * easeIn;
    const px = cx + Math.cos(a)*v, py = cy + Math.sin(a)*v;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  const fg = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  fg.addColorStop(0, hexA(COL.cyan,0.40));
  fg.addColorStop(1, hexA(COL.cyan,0.10));
  ctx.fillStyle = fg; ctx.fill();
  ctx.strokeStyle = COL.cyan; ctx.lineWidth=2; ctx.lineJoin='round';
  ctx.shadowColor = COL.cyan; ctx.shadowBlur = 8;
  ctx.stroke();
  // vertices
  for(let i=0;i<n;i++){
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    const v = (profile[RADAR_AXES[i].key]||0) * norm * easeIn;
    const px = cx + Math.cos(a)*v, py = cy + Math.sin(a)*v;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // labels
  for(let i=0;i<n;i++){
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    const lx = cx + Math.cos(a)*(r+22), ly = cy + Math.sin(a)*(r+22);
    text(RADAR_AXES[i].label, lx, ly, 14, hexA(RADAR_AXES[i].color,0.9),'center',800,'system-ui',1);
  }
  // title
  text('BRAIN PROFILE', cx, cy-r-44, 14, COL.muted,'center',700,'system-ui',2);
}

/* =========================================================================
   GAME — state machine, run flow, HUD, scoring, results
   ========================================================================= */
const Game = {
  state:'menu',                 // menu | picker | intro | play | roundend | results
  mode:'daily',                 // 'daily' | 'practice'
  // run state
  queue:[], roundIdx:0, current:null,
  roundTime:18, roundLeft:0,
  score:0, combo:0, maxCombo:0,
  correct:0, wrong:0, reactSum:0, reactN:0,
  // anim
  tState:0, introT:0, resultT:0, indexShown:0,
  ROUNDS:5,
  // run-end hooks
  onRunEnd:null,

  loadSettings(){
    this.muted = Store.get('muted', false);
    this.reducedMotion = Store.get('reducedMotion', reducedMotionPref);
    this.onboarded = Store.get('onboarded', false);
    Audio_.muted = this.muted;
    reducedMotion = this.reducedMotion;
  },
  toggleMute(){
    this.muted = !this.muted;
    Audio_.muted = this.muted;
    Store.set('muted', this.muted);
  },
  toggleReducedMotion(){
    this.reducedMotion = !this.reducedMotion;
    reducedMotion = this.reducedMotion;
    Store.set('reducedMotion', this.reducedMotion);
    if(this.reducedMotion) Field.init();
  },
  togglePause(){
    if(this.state==='play'){
      this.state='paused'; this.pauseAt=now();
      Audio_.padSetHeat(0);
      Audio_.uiClick();
    } else if(this.state==='paused'){
      // shift shownAt timestamps forward by the paused duration so RT timing isn't penalised
      const delta = now() - this.pauseAt;
      if(this.current && this.current.shownAt) this.current.shownAt += delta;
      this.state='play';
      Audio_.uiClick();
    }
  },

  /* ----- daily number (1-indexed since epoch of game) ----- */
  dailyNumber(){
    const epoch = new Date(2024,0,1); epoch.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.round((today - epoch) / 86400000) + 1;
  },

  startRun(mode){
    this.mode = mode || 'daily';
    this.ROUNDS = 5;
    if(this.mode==='daily'){
      // deterministic 5-of-N selection seeded by date
      const sel = pickDailyGames(this.ROUNDS);
      this.queue = sel.games;
      this._dailySeed = sel.seed;
    } else {
      this.queue = shuffle(GAMES.slice()).slice(0,this.ROUNDS);
      this._dailySeed = 0;
    }
    this.roundIdx=0; this.score=0; this.combo=0; this.maxCombo=0;
    this.correct=0; this.wrong=0; this.reactSum=0; this.reactN=0;
    this._perGame = {};
    Field.heat=0;
    this.beginRound();
  },
  startPractice(gameObj){
    this.mode = 'practice';
    this.queue = [gameObj];
    this._dailySeed = 0;
    this.roundIdx=0; this.score=0; this.combo=0; this.maxCombo=0;
    this.correct=0; this.wrong=0; this.reactSum=0; this.reactN=0;
    this._perGame = {};
    this.ROUNDS = 1;
    Field.heat=0;
    this.beginRound();
  },
  beginRound(){
    this.current = this.queue[this.roundIdx];
    this.current.dailySeed = this._dailySeed || 0;
    this.current.init();
    this.roundLeft = this.roundTime;
    this.combo=0;
    this._roundStartScore = this.score;   // for per-game best attribution
    this.state='intro'; this.introT=1.6;
    Audio_.gameCue(this.current.name);
  },
  award(correct, reactMs, points){
    if(correct){
      this.combo++; this.maxCombo=Math.max(this.maxCombo,this.combo);
      this._lastComboT = now();
      this.correct++;
      const mult = 1 + Math.min(this.combo,15)*0.12;
      const gained = Math.round(points*mult);
      this.score += gained;
      // attribute to current game for per-game bests
      if(this.current){
        if(!this._perGame) this._perGame={};
        this._perGame[this.current.name] = (this._perGame[this.current.name]||0) + gained;
      }
      if(reactMs>0){ this.reactSum+=reactMs; this.reactN++; }
      Audio_.correct(this.combo);
      FX.float('+'+gained, LW/2, 360, COL.cyan, 40);
      if(this.combo>0 && this.combo%5===0){
        Audio_.milestone();
        FX.bang(COL.amber); FX.hit(6);
        FX.fireworks(LW/2, 360, this.combo>=15?COL.amber:COL.cyan);
      }
    } else {
      this.combo=0; this.wrong++;
      Audio_.wrong(); FX.hit(14); FX.bang(COL.magenta);
    }
  },
  comboHeat(){ return clamp(this.combo/14,0,1); },

  pointerDown(x,y){
    // onboarding overlay intercepts everything
    if(this.state==='menu' && !this.onboarded){
      this.onboarded = true; Store.set('onboarded', true); Audio_.uiClick();
      return;
    }
    if(this.state==='menu'){
      if(this._dailyBtn && inBtn(this._dailyBtn, x, y)){ Audio_.uiClick(); this.ROUNDS=5; this.startRun('daily'); return; }
      if(this._practiceBtn && inBtn(this._practiceBtn, x, y)){ Audio_.uiClick(); this.state='picker'; return; }
      if(this._gearBtn && inBtn(this._gearBtn, x, y)){ Audio_.uiClick(); this.toggleMute(); return; }
      return;
    }
    if(this.state==='picker'){
      if(this._pickerBoxes){
        for(const b of this._pickerBoxes){
          if(inBtn(b, x, y)){ Audio_.uiClick(); this.startPractice(b.game); return; }
        }
      }
      if(this._backBtn && inBtn(this._backBtn, x, y)){ Audio_.uiClick(); this.state='menu'; return; }
      return;
    }
    if(this.state==='results'){
      if(this.resultT>1.2) this.state='menu';
      return;
    }
    if(this.state==='roundend'){ return; }
    if(this.state==='paused'){
      // tap anywhere on the resume button (or anywhere) to resume
      if(this._resumeBtn && inBtn(this._resumeBtn, x, y)){ this.togglePause(); return; }
      if(this._quitBtn && inBtn(this._quitBtn, x, y)){ Audio_.uiClick(); Audio_.padStop(); this.state='menu'; return; }
      return;
    }
    if(this.state==='play' && this.current){
      if(this._pauseBtn && inBtn(this._pauseBtn, x, y)){ this.togglePause(); return; }
      this.current.down(x,y);
    }
  },
  keyConfirm(){
    if(this.state==='menu' && !this.onboarded){ this.onboarded=true; Store.set('onboarded',true); return; }
    if(this.state==='menu'){ this.ROUNDS=5; this.startRun('daily'); }
    else if(this.state==='picker') this.state='menu';
    else if(this.state==='results' && this.resultT>1.2) this.state='menu';
    else if(this.state==='paused') this.togglePause();
  },

  update(dt){
    Field.update(dt, this.state==='play'?this.comboHeat():0);
    FX.update(dt);
    Press.update(dt);

    // ambient pad lifecycle
    if(this.state==='play' && !Audio_.padOn){ Audio_.padStart(); }
    if(Audio_.padOn){ Audio_.padSetHeat(this.state==='play'? this.comboHeat() : 0); }

    if(this.state==='intro'){
      this.introT-=dt;
      // countdown beeps
      if(!this._beep) this._beep={};
      const c=Math.ceil(this.introT);
      if(c<=3 && c>0 && this._beep.last!==c){ this._beep.last=c; Audio_.count(); }
      if(this.introT<=0){ this._beep={}; this.state='play'; Audio_.go(); }
    }
    else if(this.state==='play'){
      this.current.update(dt);
      this.roundLeft-=dt;
      if(this.roundLeft<=3 && this.roundLeft>0){
        if(!this._tw) this._tw=Math.ceil(this.roundLeft);
        const c=Math.ceil(this.roundLeft);
        if(c!==this._tw){ this._tw=c; Audio_.tick(); }
      }
      if(this.roundLeft<=0){
        this.roundLeft=0;
        this.roundIdx++;
        if(this.roundIdx>=this.ROUNDS){ this.endRun(); }
        else { this.state='roundend'; this.tState=1.3; }
      }
    }
    else if(this.state==='paused'){
      // frozen; Field/FX keep animating gently above
    }
    else if(this.state==='roundend'){
      this.tState-=dt;
      if(this.tState<=0) this.beginRound();
    }
    else if(this.state==='results'){
      this.resultT+=dt;
      this.indexShown = Math.round(lerp(0,this.finalIndex, ease(clamp(this.resultT/1.4,0,1))));
    }
  },

  endRun(){
    const acc = this.correct/Math.max(1,this.correct+this.wrong);
    const avgRt = this.reactN? this.reactSum/this.reactN : 1000;
    const reactBonus = clamp((900 - avgRt)/2, -60, 220);
    const comboBonus = this.maxCombo*14;
    let idx = 420 + this.score*0.06 + acc*420 + comboBonus + reactBonus;
    idx = Math.round(clamp(idx, 380, 1680));
    this.finalIndex = idx;
    this.finalAcc = acc; this.finalRt = avgRt;
    this.rank = this.rankFor(idx);

    // Update profile (per-game bests, by-game brain scores, daily best, streak)
    Profile.recordRun({
      mode:this.mode, score:this.score, index:idx, rank:this.rank.t,
      accuracy:acc, maxCombo:this.maxCombo, avgReact:avgRt,
      games:this.queue.map(g=>g.name), domainsPlayed:this.domainsPlayed(),
      perGame: this._perGame || {}
    });
    this._isNewDailyBest = Profile.lastIsNewDailyBest;
    this._streakAfter = Profile.streak.count;

    Audio_.padStop();
    this.state='results'; this.resultT=0; this.indexShown=0;
    Audio_.win();
  },
  domainsPlayed(){
    const set = {};
    for(const g of this.queue){ for(const d of (g.domains||[])) set[d]=true; }
    return Object.keys(set);
  },
  rankFor(i){
    if(i>=1350) return {t:'SS',c:COL.amber};
    if(i>=1180) return {t:'S', c:COL.cyan};
    if(i>=1020) return {t:'A', c:'#33d17a'};
    if(i>=860)  return {t:'B', c:COL.blue};
    if(i>=680)  return {t:'C', c:COL.muted};
    return {t:'D', c:'#9aa0c8'};
  },

  /* ---------- DRAW ---------- */
  draw(){
    Field.draw();
    if(this.state==='menu') this.drawMenu();
    else if(this.state==='picker') this.drawPicker();
    else if(this.state==='intro'){ if(this.current) this.drawHUD(); this.drawIntro(); }
    else if(this.state==='play'){ this.current.draw(); FX.drawParts(); this.drawHUD(); FX.drawFloats(); this.drawPauseBtn(); }
    else if(this.state==='paused'){ if(this.current) this.current.draw(); FX.drawParts(); this.drawHUD(); this.drawPauseOverlay(); }
    else if(this.state==='roundend'){ this.drawRoundEnd(); }
    else if(this.state==='results'){ FX.drawParts(); this.drawResults(); }
    // onboarding overlay (first run only)
    if(this.state==='menu' && !this.onboarded) this.drawOnboarding();
    // flash overlay
    if(FX.flash>0){ ctx.fillStyle=hexA(FX.flashCol,FX.flash*0.4); ctx.fillRect(0,0,LW,LH); }
  },

  drawMenu(){
    // wordmark + underline
    drawWordmark(LW/2, 230, 96);
    const w=lerp(180,260,0.5+0.5*Math.sin(now()/400));
    const ug = ctx.createLinearGradient(LW/2-w/2,0,LW/2+w/2,0);
    ug.addColorStop(0, hexA(COL.cyan,0));
    ug.addColorStop(0.5, COL.cyan);
    ug.addColorStop(1, hexA(COL.cyan,0));
    ctx.fillStyle=ug; rr(LW/2-w/2, 286, w, 5, 3); ctx.fill();
    text('DAILY BRAIN ARCADE', LW/2, 318, 26, COL.muted,'center',700,'system-ui',4);

    // streak + level
    const streak = Profile.streak.count || 0;
    if(streak>0){
      // streak pill
      const pillW=210, pillH=38, pillX=LW/2-pillW/2, pillY=346;
      panel(pillX,pillY,pillW,pillH,19,{fill0:COL.amber,fill1:COL.void,fillA:0.20,stroke:COL.amber,strokeA:0.5,glow:8,glowCol:COL.amber});
      text(`🔥 ${streak}-DAY STREAK`, LW/2, pillY+pillH/2, 22, COL.amber,'center',800,'system-ui',2);
    }
    const lv = Profile.level();

  drawPicker(){

      const x=sx+(i%cols)*(bw+gap), y=sy+Math.floor(i/cols)*(bh+gap);
      this._pickerBoxes.push({x,y,w:bw,h:bh,game:g});
      const accent = g.accent || COL.cyan;

      panel(x,y,bw,bh,18,{fill0:COL.blue,fill1:COL.void,fillA:0.18,stroke:accent,strokeA:0.45,glow:best>0?14:8,glowCol:accent});

  drawHUD(){
    // ---- timer bar (glassy track + gradient fill with glow + shimmer) ----
    const t=clamp(this.roundLeft/this.roundTime,0,1);
    const bx=40,by=64,bw=LW-80,bh=16;
    // track
    panel(bx,by,bw,bh,8,{fill0:COL.dim,fill1:COL.void,fillA:0.55,stroke:COL.dim,strokeA:0.3,glow:0});
    // fill
    if(t>0){
      const tc0 = t<0.25? COL.magenta : (t<0.5? COL.amber : COL.cyan);
      const tc1 = t<0.25? mixHex(COL.magenta,'#ff8a8a',0.4) : mixHex(tc0, '#ffffff', 0.35);
      ctx.save();
      ctx.shadowColor = tc0; ctx.shadowBlur = 12;
      const fg = ctx.createLinearGradient(bx,0,bx+bw*t,0);
      fg.addColorStop(0, hexA(tc0,0.95));
      fg.addColorStop(1, hexA(tc1,0.95));
      rr(bx,by,bw*t,bh,8); ctx.fillStyle=fg; ctx.fill();
      ctx.restore();
      // moving shimmer highlight
      const sh = (now()/1400)%1;
      const sx = bx + bw*t*sh;
      const sgrad = ctx.createLinearGradient(sx-40,0,sx+40,0);
      sgrad.addColorStop(0, hexA('#ffffff',0));
      sgrad.addColorStop(0.5, hexA('#ffffff',0.35));
      sgrad.addColorStop(1, hexA('#ffffff',0));
      ctx.save(); rr(bx,by,bw*t,bh,8); ctx.clip();
      ctx.fillStyle = sgrad; ctx.fillRect(sx-40,by,80,bh);
      ctx.restore();
    }

    // ---- score panel (left) ----
    const spX=24, spY=104, spW=240, spH=88;
    panel(spX,spY,spW,spH,16,{fill0:COL.blue,fill1:COL.void,fillA:0.32,stroke:COL.blue,strokeA:0.35,glow:0});
    text('SCORE', spX+18, spY+24, 18, COL.muted,'left',700,'system-ui',2);
    text(this.score.toLocaleString(), spX+18, spY+58, 40, COL.mist,'left',900,MONO);

    // ---- round panel (right) ----
    const rpX=LW-24-spW, rpY=spY;
    panel(rpX,rpY,spW,spH,16,{fill0:COL.blue,fill1:COL.void,fillA:0.32,stroke:COL.blue,strokeA:0.35,glow:0});
    text('ROUND', rpX+spW-18, rpY+24, 18, COL.muted,'right',700,'system-ui',2);
    text(`${this.roundIdx+1}/${this.ROUNDS}`, rpX+spW-18, rpY+58, 40, COL.mist,'right',900,MONO);

    // ---- combo meter (center) with glow + scale pulse ----
    if(this.combo>1){
      const heat=this.comboHeat();
      const col = heat>0.6?COL.amber:COL.cyan;
      const pulse = 1 + 0.06*Math.sin(now()/120);
      // recent increment kick
      const kickAgo = (now() - (this._lastComboT||0))/1000;
      const kick = kickAgo<0.25? (1 - kickAgo/0.25)*0.25 : 0;
      const scl = pulse + kick;
      const sz = (52 + Math.min(this.combo,12)*1.8) * scl;
      // glow
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font = `900 ${sz}px ${MONO}`;
      for(let r=0;r<3;r++){ ctx.fillStyle=hexA(col, 0.18); ctx.fillText('×'+this.combo, LW/2, 152); }
      ctx.restore();
      text('×'+this.combo, LW/2, 152, sz, col,'center',900,MONO);
      text('COMBO', LW/2, 152+sz*0.5+12, 16, hexA(col,0.85),'center',700,'system-ui',3);
    }

    // game name strip
    text(this.current.name, LW/2, 244, 24, hexA(COL.mist,0.45),'center',800,'system-ui',3);
  },

  drawIntro(){
    // dim + accent-tinted backdrop
    ctx.fillStyle=hexA('#05060f',0.6); ctx.fillRect(0,0,LW,LH);
    const accent = this.current.accent || COL.cyan;
    const c=Math.ceil(this.introT);

    // mode/daily framing header
    if(this.mode==='daily'){
      text('DAILY CHALLENGE  #'+this.dailyNumber(), LW/2, 360, 22, hexA(COL.cyan,0.85),'center',800,'system-ui',3);
      const streak = Profile.streak.count || 0;
      if(streak>0) text('🔥 '+streak+'-DAY STREAK', LW/2, 392, 18, hexA(COL.amber,0.8),'center',700,'system-ui',2);
    } else {
      text('PRACTICE', LW/2, 372, 22, hexA(COL.blue,0.8),'center',800,'system-ui',3);
    }

    // round indicator dots for daily
    if(this.mode==='daily' && this.ROUNDS>1){
      const dotR=6, gap=18, totalW=(this.ROUNDS-1)*gap;
      const sx=LW/2-totalW/2;
      for(let i=0;i<this.ROUNDS;i++){
        const x=sx+i*gap, y=420;
        const done = i<this.roundIdx, current = i===this.roundIdx;
        ctx.fillStyle = done? COL.cyan : (current? COL.amber : hexA(COL.dim,0.6));
        ctx.beginPath(); ctx.arc(x,y, current? dotR+2 : dotR, 0, Math.PI*2); ctx.fill();
      }
    }

    if(c>0 && this.introT>0.05){
      const s = 1 + (1-(this.introT%1))*0.5;
      // glow halo behind name
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.font = `900 44px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hexA(accent, 0.20);
      for(let r=0;r<3;r++) ctx.fillText(this.current.name, LW/2, 500);
      ctx.restore();
      text(this.current.name, LW/2, 500, 44, accent,'center',900,'system-ui',3);
      // TRAINS tagline
      const doms = (this.current.domains||[]).map(d=>{
        const L = {memory:'MEMORY',attention:'ATTENTION',speed:'PROCESSING SPEED',reasoning:'REASONING',language:'LANGUAGE',executive:'EXECUTIVE FUNCTION'};
        return L[d]||d;
      }).join(' · ');
      if(doms) text('TRAINS  '+doms, LW/2, 548, 20, hexA(accent,0.7),'center',700,'system-ui',2);
      text(this.current.hint, LW/2, 590, 26, COL.muted,'center',600);
      // countdown number with glow
      ctx.save();
      ctx.shadowColor = COL.mist; ctx.shadowBlur = 30;
      text(String(c), LW/2, 770, 200*s, COL.mist,'center',900,MONO);
      ctx.restore();
    } else {
      // GO burst
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.font = `900 180px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hexA(accent, 0.30);
      for(let r=0;r<4;r++) ctx.fillText('GO', LW/2, 720);
      ctx.restore();
      text('GO', LW/2, 720, 180, accent,'center',900,'system-ui',4);
    }
  },

  drawResults(){
    const r=this.rank;
    const isNew = this._isNewDailyBest && this.mode==='daily';
    text('RUN COMPLETE', LW/2, 240, 34, COL.muted,'center',800,'system-ui',4);

    // NEW BEST banner
    if(isNew && this.resultT>0.4){
      const ba = clamp((this.resultT-0.4)/0.4, 0, 1);
      const bp = 0.5+0.5*Math.sin(now()/200);
      ctx.save();
      ctx.globalAlpha = ba;
      text('★ NEW DAILY BEST ★', LW/2, 290, 26, hexA(COL.amber, 0.6+0.4*bp),'center',900,'system-ui',3);
      ctx.restore();
    }

    // rank stamp with additive glow + gradient fill
    const pop = easeOutBack(clamp(this.resultT/0.6,0,1));
    const stampPulse = 0.5+0.5*Math.sin(now()/500);
    ctx.save();
    ctx.translate(LW/2,420);
    ctx.scale(pop,pop);
    ctx.globalAlpha=clamp(this.resultT/0.4,0,1);
    // additive glow halo
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const rg = ctx.createRadialGradient(0,0,0,0,0,180);
    rg.addColorStop(0, hexA(r.c, 0.4+0.2*stampPulse));
    rg.addColorStop(1, hexA(r.c, 0));
    ctx.fillStyle = rg;
    ctx.fillRect(-180,-180,360,360);
    ctx.restore();
    // gradient letter
    ctx.shadowColor=r.c; ctx.shadowBlur=40;
    ctx.font = `900 220px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lg = ctx.createLinearGradient(0,-110,0,110);
    lg.addColorStop(0, mixHex(r.c,'#ffffff',0.5));
    lg.addColorStop(1, mixHex(r.c, COL.void, 0.2));
    ctx.fillStyle = lg;
    ctx.fillText(r.t, 0, 0);
    ctx.restore();
    text('RANK', LW/2, 560, 26, hexA(r.c,0.8),'center',800,'system-ui',6);

    // cognitive index count-up with glow
    text('COGNITIVE INDEX', LW/2, 660, 24, COL.muted,'center',700,'system-ui',3);
    ctx.save();
    ctx.shadowColor = COL.cyan; ctx.shadowBlur = 18;
    text(String(this.indexShown), LW/2, 730, 100, COL.cyan,'center',900,MONO);
    ctx.restore();

    // stat block + brain profile radar (side by side)
    const radarR=110, radarCX=240, radarCY=980;
    const statsX=420, statsW=LW-statsX-70, statsY=890;

    // Brain Profile radar (left)
    drawRadar(radarCX, radarCY, radarR, Profile.profile, Profile.maxProfile());

    // stats (right column, 2 rows of 2)
    const stats=[
      ['SCORE', this.score.toLocaleString()],
      ['ACCURACY', Math.round(this.finalAcc*100)+'%'],
      ['MAX COMBO', '×'+this.maxCombo],
      ['AVG REACT', this.reactN? Math.round(this.finalRt)+'ms' : '—']
    ];
    const rowH=64;
    stats.forEach((s,i)=>{
      const col = i%2, row=Math.floor(i/2);
      const x = statsX + col*(statsW/2+10);
      const y = statsY + row*(rowH+20);
      text(s[0], x, y, 20, COL.muted,'left',700,'system-ui',1);
      text(s[1], x, y+30, 30, COL.mist,'left',800,MONO);
    });
    // divider line down the middle
    const dvX = statsX-16;
    const lg2 = ctx.createLinearGradient(0,statsY-10,0,statsY+rowH*2+30);
    lg2.addColorStop(0, hexA(COL.dim,0.1));
    lg2.addColorStop(0.5, hexA(COL.dim,0.5));
    lg2.addColorStop(1, hexA(COL.dim,0.1));
    ctx.strokeStyle=lg2; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(dvX, statsY-10); ctx.lineTo(dvX, statsY+rowH*2+20); ctx.stroke();

    if(this.resultT>1.2){
      const pulse=0.5+0.5*Math.sin(now()/300);
      text('tap to play again', LW/2, 1180, 28, hexA(COL.cyan,0.5+0.5*pulse),'center',700,'system-ui',2);
    }
  }
};

/* =========================================================================
   PROFILE — persistent bests, streak, XP, brain scores, history
   ========================================================================= */
const Profile = {
  best:{ byDaily:0, byGame:{} },
  streak:{ count:0, lastDay:'' },
  xp:0,
  profile:{ memory:0, attention:0, speed:0, reasoning:0, language:0, executive:0 },
  history:[],          // last 30 {day, mode, score, index, rank}
  lastIsNewDailyBest:false,

  DOMAINS:['memory','attention','speed','reasoning','language','executive'],
  DOM_LABELS:{memory:'MEMORY',attention:'ATTENTION',speed:'SPEED',reasoning:'REASONING',language:'LANGUAGE',executive:'EXEC'},

  load(){
    this.best = Store.get('best', {byDaily:0, byGame:{}});
    this.streak = Store.get('streak', {count:0, lastDay:''});
    this.xp = Store.get('xp', 0);
    this.profile = Store.get('profile', {memory:0,attention:0,speed:0,reasoning:0,language:0,executive:0});
    this.history = Store.get('history', []);
    // backfill missing domain keys
    for(const d of this.DOMAINS) if(!(d in this.profile)) this.profile[d]=0;
  },
  level(){ return 1 + Math.floor(Math.sqrt(Math.max(0,this.xp))/4); },
  maxProfile(){
    let m=1;
    for(const d of this.DOMAINS) m = Math.max(m, this.profile[d]||0);
    return m;
  },

  playedDailyToday(){
    const today = ymd(new Date());
    return this.history.some(h => h.day===today && h.mode==='daily');
  },

  recordRun(r){
    this.lastIsNewDailyBest = false;
    if(r.mode==='daily'){
      if(r.score > this.best.byDaily){ this.best.byDaily = r.score; this.lastIsNewDailyBest = true; }
      this.bumpStreak();
    }
    // per-game best: use accurate per-game score map when available
    if(r.perGame){
      for(const name in r.perGame){
        const cur = this.best.byGame[name] || 0;
        if(r.perGame[name] > cur) this.best.byGame[name] = r.perGame[name];
      }
    }
    // XP
    this.xp += Math.max(1, Math.round(r.score/10));
    // Brain profile: per-domain slow blend toward an improving target
    const speedScore = clamp(1 - (r.avgReact-300)/900, 0, 1); // 300ms=1, 1200ms=0
    const composite = clamp(r.accuracy*0.5 + speedScore*0.3 + clamp(r.maxCombo/15,0,1)*0.2, 0, 1);
    const gain = Math.round(r.index * composite * 0.05);
    for(const d of r.domainsPlayed){
      if(!(d in this.profile)) this.profile[d]=0;
      const target = this.profile[d] + gain;
      this.profile[d] = Math.round(this.profile[d]*0.7 + target*0.3);
    }
    // history (cap 30, daily first per day kept)
    const today = ymd(new Date());
    const entry = {day:today, mode:r.mode, score:r.score, index:r.index, rank:r.rank};
    if(r.mode==='daily'){
      // keep only first daily per day
      const existing = this.history.findIndex(h => h.day===today && h.mode==='daily');
      if(existing>=0) this.history[existing] = entry;
      else this.history.push(entry);
    } else {
      this.history.push(entry);
    }
    while(this.history.length>30) this.history.shift();
    this.save();
  },

  bumpStreak(){
    const today = ymd(new Date());
    if(this.streak.lastDay === today) return; // already counted
    const yesterday = ymd(new Date(Date.now() - 86400000));
    if(this.streak.lastDay === yesterday){ this.streak.count += 1; }
    else { this.streak.count = 1; }
    this.streak.lastDay = today;
  },

  save(){
    Store.set('best', this.best);
    Store.set('streak', this.streak);
    Store.set('xp', this.xp);
    Store.set('profile', this.profile);
    Store.set('history', this.history);
  }
};

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
Field.init();
Profile.load();
Game.loadSettings();
let last=now();
function frame(){
  const t=now(); let dt=(t-last)/1000; last=t;
  dt=Math.min(dt,0.05);
  Game.update(dt);

  // clear + view transform with shake
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=COL.void; ctx.fillRect(0,0,canvas.width,canvas.height);

  const sh=FX.shake;
  const shx = sh? rand(-sh,sh):0, shy = sh? rand(-sh,sh):0;
  ctx.setTransform(scale*DPR,0,0,scale*DPR,(ox+shx)*DPR,(oy+shy)*DPR);

  // clip to logical frame
  ctx.save();
  rr(0,0,LW,LH,0); ctx.clip();
  Game.draw();
  ctx.restore();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
