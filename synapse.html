<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Noggin — Brain Arcade</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05060f; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
"use strict";
/* =========================================================================
   Noggin — daily brain arcade
   Single-file HTML5 canvas game (YouTube Playables friendly).
   Original work; not affiliated with any existing brain-training product.
   State is in-memory only. For a real deployment you can wire a "best score"
   into localStorage at the spots marked PERSIST below.
   ========================================================================= */

const LW = 720, LH = 1280;                 // logical resolution (9:16 portrait)
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let DPR = 1, scale = 1, ox = 0, oy = 0;    // view transform (set in resize)

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  scale = Math.min(W / LW, H / LH);
  ox = (W - LW * scale) / 2;
  oy = (H - LH * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

/* ---------- palette ---------- */
const COL = {
  void:'#05060f', field0:'#0c1130', field1:'#1a0f3c',
  cyan:'#27e6d8', blue:'#4d7cff', magenta:'#ff3d8b',
  amber:'#ffb02e', mist:'#eaeeff', muted:'#7d86bd', dim:'#39406e',
  green:'#33d17a', violet:'#9b6dff', pink:'#ff7ad1'
};

/* hex helpers */
function hexRGB(hex){
  const n=parseInt(hex.slice(1),16);
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}
function hexA(hex,a){
  const c=hexRGB(hex);
  return `rgba(${c.r},${c.g},${c.b},${clamp(a,0,1)})`;
}
function mix(hexA_, hexB, t){
  const a=hexRGB(hexA_), b=hexRGB(hexB);
  const r=Math.round(lerp(a.r,b.r,t)), g=Math.round(lerp(a.g,b.g,t)), bl=Math.round(lerp(a.b,b.b,t));
  return `rgb(${r},${g},${bl})`;
}
function mixHex(hexA_, hexB, t){
  const a=hexRGB(hexA_), b=hexRGB(hexB);
  const r=Math.round(lerp(a.r,b.r,t)), g=Math.round(lerp(a.g,b.g,t)), bl=Math.round(lerp(a.b,b.b,t));
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

/* ---------- helpers ---------- */
const rand  = (a,b)=> a + Math.random()*(b-a);
const irand = (a,b)=> Math.floor(rand(a,b+1));
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp  = (a,b,t)=> a+(b-a)*t;
const now   = ()=> performance.now();
const pick  = arr => arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
const ease = t => 1-Math.pow(1-t,3);
const easeOutBack = t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); };
const easeOutExpo = t => t===1?1:1-Math.pow(2,-10*t);

function rr(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function circle(x,y,r){ ctx.beginPath(); ctx.arc(x,y,Math.max(0.1,r),0,Math.PI*2); }
function text(str,x,y,size,color,align='center',weight=800,font='system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif',spacing=0){
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.font = `${weight} ${size}px ${font}`;
  if(spacing){
    ctx.save(); ctx.textAlign='left';
    let total=0; for(const ch of str){ total += ctx.measureText(ch).width + spacing; }
    total -= spacing;
    let cx = align==='center'? x-total/2 : (align==='right'? x-total : x);
    for(const ch of str){ ctx.fillText(ch,cx,y); cx += ctx.measureText(ch).width + spacing; }
    ctx.restore();
  } else {
    ctx.fillText(str,x,y);
  }
}
const MONO = 'ui-monospace,SFMono-Regular,Menlo,Consolas,monospace';

/* ---------- shared UI: glassy panels & buttons ---------- */
/* Draws a rounded panel with a vertical gradient, soft outer glow, top inner highlight, and bottom shadow line. */
function panel(x,y,w,h,r,opts){
  opts = opts || {};
  const fill0 = opts.fill0 || mixHex(COL.blue, COL.void, 0.55);
  const fill1 = opts.fill1 || mixHex(COL.blue, COL.void, 0.78);
  const fillA = opts.fillA!=null? opts.fillA : 0.55;
  const stroke = opts.stroke || COL.blue;
  const strokeA = opts.strokeA!=null? opts.strokeA : 0.45;
  const glow = opts.glow!=null? opts.glow : (opts.glowCol? 18 : 0);
  const glowCol = opts.glowCol || stroke;
  // outer glow
  if(glow>0){
    ctx.save();
    ctx.shadowColor = glowCol; ctx.shadowBlur = glow;
    rr(x,y,w,h,r);
    ctx.fillStyle = hexA(fill0, 0.01); // virtually transparent; just to cast shadow
    ctx.fill();
    ctx.restore();
  }
  // body gradient
  const g = ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0, hexA(fill0, fillA));
  g.addColorStop(1, hexA(fill1, fillA*0.85));
  rr(x,y,w,h,r);
  ctx.fillStyle = g; ctx.fill();
  // top inner highlight (1px bright line)
  ctx.save();
  rr(x+1,y+1,w-2,h-2,Math.max(1,r-1));
  ctx.clip();
  ctx.strokeStyle = hexA('#ffffff', 0.10);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x+r, y+1.5); ctx.lineTo(x+w-r, y+1.5); ctx.stroke();
  ctx.restore();
  // stroke
  if(strokeA>0){
    rr(x,y,w,h,r);
    ctx.lineWidth = opts.lineWidth||1.5; ctx.strokeStyle = hexA(stroke, strokeA); ctx.stroke();
  }
  return {x,y,w,h};
}

/* Press-flash registry: tiles light up briefly when tapped. */
const Press = {
  flashes:[], // {x,y,w,h,col,life}
  add(x,y,w,h,col){ this.flashes.push({x,y,w,h,col,life:1}); },
  update(dt){ for(const f of this.flashes) f.life -= dt*4.5; this.flashes = this.flashes.filter(f=>f.life>0); },
  draw(){
    for(const f of this.flashes){
      const a = clamp(f.life,0,1);
      ctx.save();
      rr(f.x,f.y,f.w,f.h,18);
      ctx.fillStyle = hexA(f.col, 0.35*a);
      ctx.fill();
      ctx.restore();
    }
  }
};
function pressAt(b, col){ Press.add(b.x,b.y,b.w,b.h,col); }

const reducedMotionPref = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- seeded RNG (deterministic Daily Challenge) ---------- */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function ymd(date){ // YYYY-MM-DD local
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function dailySeedNum(offsetDays){
  const date = new Date(); date.setHours(0,0,0,0);
  if(offsetDays) date.setDate(date.getDate()+offsetDays);
  const y = date.getFullYear();
  const m = date.getMonth()+1;
  const d = date.getDate();
  // hash the ymd into a 32-bit int
  return (((y*100+m)*100+d) >>> 0) * 2654435761 >>> 0;
}
function makeRNG(seed){ // null/0 = Math.random, otherwise mulberry32
  if(!seed) return Math.random;
  return mulberry32(seed);
}

/* ---------- persistence (localStorage with in-memory fallback) ---------- */
const Store = {
  mem:{},
  get(k, def){
    try{
      const v = localStorage.getItem('noggin_'+k);
      if(v == null) return (k in this.mem)? this.mem[k] : def;
      return JSON.parse(v);
    }catch(e){ return (k in this.mem)? this.mem[k] : def; }
  },
  set(k, v){
    this.mem[k] = v;
    try{ localStorage.setItem('noggin_'+k, JSON.stringify(v)); }catch(e){}
  }
};

let reducedMotion = reducedMotionPref;

/* =========================================================================
   AUDIO — richer WebAudio synth (chords, noise tails, filter, sidechain,
   ambient pad). Backward-compatible method names keep call sites working.
   ========================================================================= */
const Audio_ = {
  ac:null, master:null, musicBus:null, sfxBus:null, sidechain:null,
  muted:false,
  noiseBuf:null,
  padVoices:[], padOn:false, padFilter:null,

  init(){
    if(this.ac) return;
    try{
      this.ac = new (window.AudioContext||window.webkitAudioContext)();
      const ac = this.ac;

      // master chain: master gain -> soft clipper (waveshaper-ish via limiter) -> destination
      this.master = ac.createGain();
      this.master.gain.value = 0.55;

      // shared low-pass on master for warmth
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 14000;
      lp.Q.value = 0.4;

      // sidechain: a gain node whose gain gets ducked during big moments.
      // MUSIC bus goes THROUGH the sidechain so the SFX can punch through.
      this.sidechain = ac.createGain();
      this.sidechain.gain.value = 1.0;

      // buses
      this.musicBus = ac.createGain();
      this.musicBus.gain.value = 1.0;
      this.sfxBus = ac.createGain();
      this.sfxBus.gain.value = 1.0;

      // routing: music -> sidechain -> master ; sfx -> master ; master -> lp -> out
      this.musicBus.connect(this.sidechain);
      this.sidechain.connect(this.master);
      this.sfxBus.connect(this.master);
      this.master.connect(lp);
      lp.connect(ac.destination);

      // pre-bake a noise buffer for tails
      const len = Math.floor(ac.sampleRate * 0.5);
      this.noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
      const data = this.noiseBuf.getChannelData(0);
      for(let i=0;i<len;i++) data[i] = (Math.random()*2-1) * (1 - i/len);
    }catch(e){ this.ac=null; }
  },
  resume(){ if(this.ac && this.ac.state==='suspended') this.ac.resume(); },

  /* Trigger a brief sidechain duck (for milestones / wins). */
  duck(depth=0.45, ms=180){
    if(!this.ac || !this.sidechain) return;
    const t = this.ac.currentTime;
    const g = this.sidechain.gain;
    g.cancelScheduledValues(t);
    g.setValueAtTime(g.value, t);
    g.linearRampToValueAtTime(1-depth, t + 0.012);
    g.linearRampToValueAtTime(1.0, t + ms/1000);
  },

  /* Core oscillator voice with optional detune partner, low-pass, and noise tail. */
  voice(freq, dur=0.09, opts){
    if(!this.ac||this.muted) return;
    opts = opts || {};
    const ac = this.ac;
    const t = ac.currentTime;
    const type = opts.type || 'sine';
    const vol = opts.vol!=null? opts.vol : 0.4;
    const glide = opts.glideTo || null;
    const detune = opts.detune!=null? opts.detune : 6;   // cents for second osc
    const bus = opts.bus || this.sfxBus;

    const out = ac.createGain();
    out.gain.setValueAtTime(0.0001, t);
    out.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    out.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    out.connect(bus);

    // optional per-voice low-pass for warmth
    const lp = ac.createBiquadFilter();
    lp.type='lowpass';
    lp.frequency.value = opts.cut!=null? opts.cut : 4500;
    lp.Q.value = 0.6;
    lp.connect(out);

    const o1 = ac.createOscillator();
    o1.type = type; o1.frequency.setValueAtTime(freq, t);
    if(glide) o1.frequency.exponentialRampToValueAtTime(glide, t+dur);
    o1.connect(lp);
    o1.start(t); o1.stop(t+dur+0.03);

    // detuned partner for richness
    if(opts.chord !== false){
      const o2 = ac.createOscillator();
      o2.type = type; o2.frequency.setValueAtTime(freq, t);
      o2.detune.value = detune;
      if(glide) o2.frequency.exponentialRampToValueAtTime(glide, t+dur);
      o2.connect(lp);
      o2.start(t); o2.stop(t+dur+0.03);
    }

    // optional noise tail
    if(opts.noise){
      const ns = ac.createBufferSource();
      ns.buffer = this.noiseBuf;
      const nf = ac.createBiquadFilter();
      nf.type='bandpass'; nf.frequency.value=freq; nf.Q.value=0.8;
      const ng = ac.createGain();
      ng.gain.setValueAtTime(vol*0.4, t);
      ng.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
      ns.connect(nf); nf.connect(ng); ng.connect(out);
      ns.start(t); ns.stop(t+0.5);
    }
  },

  /* Chord: stack of frequencies with slightly staggered attacks. */
  chord(freqs, dur=0.18, opts){
    if(!this.ac||this.muted) return;
    opts = opts||{};
    const vol = opts.vol!=null? opts.vol : 0.28;
    freqs.forEach((f,i)=>{
      setTimeout(()=>this.voice(f, dur, Object.assign({}, opts, {vol:vol})), i*8);
    });
  },

  /* ---- Backward-compatible SFX API (richer implementations) ---- */
  blip(freq,dur=0.09,type='sine',vol=0.4,glideTo=null){
    this.voice(freq, dur, {type, vol, glideTo:glideTo});
  },
  correct(combo=0){
    const base = 520 + Math.min(combo,12)*22;
    // major-third chord with a sparkle on top
    this.chord([base, base*1.26, base*1.5], 0.10, {type:'triangle', vol:0.26, cut:6000});
    setTimeout(()=>this.voice(base*2, 0.08, {type:'sine', vol:0.18, cut:8000}), 40);
  },
  wrong(){
    this.voice(160, 0.20, {type:'sawtooth', vol:0.28, glideTo:80, cut:2200, detune:10});
    this.voice(120, 0.22, {type:'square', vol:0.16, glideTo:70, cut:1800});
  },
  tick(){ this.voice(330, 0.04, {type:'square', vol:0.12, cut:4000, chord:false}); },
  milestone(){
    this.duck(0.5, 220);
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.voice(f,0.16,{type:'triangle',vol:0.30,cut:7000,noise:i===3}),i*70));
    setTimeout(()=>this.voice(1568,0.20,{type:'sine',vol:0.20,cut:9000}), 240);
  },
  count(){ this.voice(440, 0.07, {type:'square', vol:0.22, cut:3500, chord:false}); },
  go(){
    this.voice(660, 0.20, {type:'triangle', vol:0.4, glideTo:1320, cut:7000, noise:true});
    this.voice(330, 0.20, {type:'sine', vol:0.25, glideTo:660, cut:4000});
  },
  win(){
    this.duck(0.4, 400);
    const seq=[523,659,784,1047,1319,1568];
    seq.forEach((f,i)=>setTimeout(()=>this.chord([f, f*1.5], 0.20, {type:'triangle', vol:0.26, cut:8000}), i*90));
    setTimeout(()=>this.chord([523,659,784,1047], 0.6, {type:'triangle', vol:0.20, cut:8000}), seq.length*90);
  },

  /* ---- Subtle UI click ---- */
  uiClick(){ this.voice(680, 0.04, {type:'triangle', vol:0.12, cut:5000, chord:false}); },

  /* ---- Per-game identity ----
     Called from Game.beginRound so each game gets a distinct timbre cue. */
  gameCue(name){
    if(!this.ac||this.muted) return;
    switch(name){
      case 'MATH RUSH':    this.chord([392,494,587], 0.12, {type:'triangle',vol:0.22,cut:6000}); break;
      case 'COLOR CLASH':  // chromatic wink
        this.voice(440,0.06,{type:'square',vol:0.18,cut:4000,chord:false});
        setTimeout(()=>this.voice(466,0.06,{type:'square',vol:0.18,cut:4000,chord:false}),70); break;
      case 'REFLEX':       // rising sweep
        this.voice(300,0.30,{type:'sawtooth',vol:0.20,glideTo:700,cut:3000}); break;
      case 'RECALL':       // soft pentatonic motif
        [523,659,784].forEach((f,i)=>setTimeout(()=>this.voice(f,0.14,{type:'sine',vol:0.22,cut:5000}),i*90)); break;
      case 'SEQUENCE':     this.chord([330,415,494], 0.12, {type:'triangle',vol:0.22,cut:5000}); break;
      case 'N-BACK':       // deep, focused
        this.voice(196,0.30,{type:'sine',vol:0.28,glideTo:220,cut:2200});
        this.voice(98, 0.30,{type:'sine',vol:0.20,cut:1200}); break;
      case 'SPEED MATCH':  // quick tick duet
        this.voice(880,0.06,{type:'square',vol:0.18,cut:5000,chord:false});
        setTimeout(()=>this.voice(1108,0.06,{type:'square',vol:0.18,cut:5000,chord:false}),60); break;
      case 'PATTERN':      // contemplative chime
        this.chord([659,784,988], 0.16, {type:'sine', vol:0.22, cut:6000}); break;
      case 'VISUAL SEARCH': // alert sweep
        this.voice(500,0.20,{type:'sawtooth',vol:0.18,glideTo:900,cut:4000}); break;
      case 'TRAIL':        // sequential steps
        [392,494,587].forEach((f,i)=>setTimeout(()=>this.voice(f,0.10,{type:'triangle',vol:0.22,cut:5000}),i*70)); break;
      case 'WORD WEB':    // warm vocal-ish vowel pad
        this.chord([330,415,494], 0.20, {type:'triangle', vol:0.20, cut:4000}); break;
      case 'SPIN CODE':   // crisp data tick
        this.voice(740,0.05,{type:'square',vol:0.16,cut:5000,chord:false});
        setTimeout(()=>this.voice(988,0.05,{type:'square',vol:0.16,cut:5000,chord:false}),50); break;
    }
  },

  /* ---- Ambient pad: a slow swelling chord bed driven by combo heat ---- */
  padStart(){
    if(!this.ac||this.muted||this.padOn) return;
    this.padOn = true;
    const ac = this.ac;
    // root + fifth + octave, slightly detuned
    const freqs = [130.81, 196.00, 261.63]; // C3 G3 C4
    const padGain = ac.createGain();
    padGain.gain.value = 0.0;
    padGain.connect(this.musicBus);
    this.padFilter = ac.createBiquadFilter();
    this.padFilter.type='lowpass'; this.padFilter.frequency.value=900; this.padFilter.Q.value=0.5;
    this.padFilter.connect(padGain);
    this.padGain = padGain;
    this.padVoices = freqs.map((f,i)=>{
      const o = ac.createOscillator();
      o.type = i===0? 'sine' : 'triangle';
      o.frequency.value = f;
      o.detune.value = (i-1)*8;
      const g = ac.createGain(); g.gain.value = 0.16 / freqs.length * (i===0?1.3:1);
      o.connect(g); g.connect(this.padFilter);
      o.start();
      return o;
    });
    // slow LFO on the filter for movement
    const lfo = ac.createOscillator(); lfo.frequency.value = 0.08;
    const lfoGain = ac.createGain(); lfoGain.gain.value = 250;
    lfo.connect(lfoGain); lfoGain.connect(this.padFilter.frequency);
    lfo.start();
    this.padLFO = lfo;
    this.padTargetVol = 0;
  },
  padSetHeat(heat){
    // heat 0..1; map to volume and filter openness
    if(!this.ac||!this.padOn) return;
    const target = 0.04 + 0.16*heat;
    const cutTarget = 700 + heat*2600;
    const t = this.ac.currentTime;
    this.padGain.gain.cancelScheduledValues(t);
    this.padGain.gain.setTargetAtTime(target, t, 0.6);
    this.padFilter.frequency.setTargetAtTime(cutTarget, t, 0.6);
  },
  padStop(){
    if(!this.ac||!this.padOn) return;
    this.padOn = false;
    const t = this.ac.currentTime;
    if(this.padGain) this.padGain.gain.setTargetAtTime(0, t, 0.3);
    const voices = this.padVoices; const lfo = this.padLFO;
    setTimeout(()=>{ voices.forEach(o=>{try{o.stop();}catch(e){}}); if(lfo){try{lfo.stop();}catch(e){}} }, 800);
    this.padVoices = [];
  }
};

/* =========================================================================
   NEURAL FIELD — living background; brightens with combo "heat"
   ========================================================================= */
const Field = {
  nodes:[], stars:[], orbs:[], heat:0, t:0,
  init(){
    this.nodes=[];
    const n = reducedMotion?22:46;
    for(let i=0;i<n;i++){
      this.nodes.push({
        x:rand(0,LW), y:rand(0,LH),
        vx:rand(-8,8), vy:rand(-8,8),
        r:rand(1.5,3.5), ph:rand(0,Math.PI*2)
      });
    }
    // parallax starfield — 3 depth layers
    this.stars=[];
    const sn = reducedMotion?40:140;
    for(let i=0;i<sn;i++){
      const depth = pick([0.25, 0.5, 1.0]); // far / mid / near
      this.stars.push({
        x:rand(0,LW), y:rand(0,LH),
        r: lerp(0.4, 1.8, depth) + rand(0,0.3),
        depth,
        ph: rand(0,Math.PI*2),
        tw: rand(0.6, 2.2) // twinkle speed
      });
    }
    // drifting colored orbs (soft blurred radial gradients)
    this.orbs=[];
    if(!reducedMotion){
      const cols=[COL.blue, COL.cyan, COL.magenta, COL.violet];
      const on = 4;
      for(let i=0;i<on;i++){
        this.orbs.push({
          x:rand(0,LW), y:rand(0,LH),
          vx:rand(-6,6), vy:rand(-6,6),
          r:rand(220,420),
          col: cols[i%cols.length],
          baseA:rand(0.05,0.10),
          ph:rand(0,Math.PI*2)
        });
      }
    }
  },
  update(dt, targetHeat){
    this.t += dt;
    this.heat = lerp(this.heat, targetHeat, 1-Math.pow(0.001,dt));
    if(reducedMotion) return;
    for(const p of this.nodes){
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.ph+=dt*2;
      if(p.x<0||p.x>LW) p.vx*=-1;
      if(p.y<0||p.y>LH) p.vy*=-1;
      p.x=clamp(p.x,0,LW); p.y=clamp(p.y,0,LH);
    }
    for(const s of this.stars){ s.ph += dt*s.tw; }
    for(const o of this.orbs){
      o.x+=o.vx*dt; o.y+=o.vy*dt; o.ph+=dt*0.6;
      if(o.x<-o.r) o.x=LW+o.r; if(o.x>LW+o.r) o.x=-o.r;
      if(o.y<-o.r) o.y=LH+o.r; if(o.y>LH+o.r) o.y=-o.r;
    }
  },
  draw(){
    const h=this.heat;
    // base gradient — shifts toward warm as heat rises
    const g=ctx.createLinearGradient(0,0,LW,LH);
    g.addColorStop(0, mixHex(COL.field0, '#1f0a18', h*0.5));
    g.addColorStop(1, mixHex(COL.field1, '#2a0f22', h*0.5));
    ctx.fillStyle=g; ctx.fillRect(0,0,LW,LH);

    // drifting soft orbs (additive)
    if(this.orbs.length){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      for(const o of this.orbs){
        const breath = 0.85 + 0.15*Math.sin(o.ph);
        const rg=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
        rg.addColorStop(0, hexA(o.col, o.baseA*breath*(1+h*0.6)));
        rg.addColorStop(1, hexA(o.col, 0));
        ctx.fillStyle=rg; ctx.fillRect(o.x-o.r,o.y-o.r,o.r*2,o.r*2);
      }
      ctx.restore();
    }

    // parallax starfield — far first, near last
    for(const s of this.stars){
      const tw = 0.5 + 0.5*Math.sin(s.ph);
      const a = (0.3 + 0.5*s.depth) * (0.4 + 0.6*tw);
      const tinted = mixHex(COL.mist, COL.amber, h*0.6);
      ctx.fillStyle = hexA(tinted, a);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r*(1+h*0.3), 0, Math.PI*2); ctx.fill();
      // near stars get a tiny cross sparkle
      if(s.depth>0.8 && tw>0.7){
        ctx.strokeStyle = hexA(tinted, a*0.5);
        ctx.lineWidth = 0.6;
        const sp = s.r*3.5;
        ctx.beginPath(); ctx.moveTo(s.x-sp,s.y); ctx.lineTo(s.x+sp,s.y);
        ctx.moveTo(s.x,s.y-sp); ctx.lineTo(s.x,s.y+sp); ctx.stroke();
      }
    }

    // central warm core glow when hot
    if(h>0.02){
      const rg=ctx.createRadialGradient(LW/2,LH*0.42,80,LW/2,LH*0.42,LH*0.7);
      rg.addColorStop(0,`rgba(255,120,60,${0.14*h})`);
      rg.addColorStop(1,'rgba(255,120,60,0)');
      ctx.fillStyle=rg; ctx.fillRect(0,0,LW,LH);
    }

    // neural nodes + connections (additive glow)
    const maxD = 165;
    const lineCol = mixHex(COL.blue, COL.amber, h);
    ctx.lineWidth = 1;
    for(let i=0;i<this.nodes.length;i++){
      const a=this.nodes[i];
      for(let j=i+1;j<this.nodes.length;j++){
        const b=this.nodes[j];
        const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if(d<maxD){
          const al=(1-d/maxD)*(0.06+0.20*h);
          ctx.strokeStyle = hexA(lineCol, al);
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(const p of this.nodes){
      const pulse = 0.6+0.4*Math.sin(p.ph);
      const col = mixHex(COL.cyan, COL.amber, h);
      // soft halo
      const rg = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6*(1+0.6*h));
      rg.addColorStop(0, hexA(col, 0.28*pulse*(0.5+h)));
      rg.addColorStop(1, hexA(col, 0));
      ctx.fillStyle = rg;
      ctx.fillRect(p.x-p.r*6, p.y-p.r*6, p.r*12, p.r*12);
      // core
      ctx.fillStyle = hexA(col, (0.5+0.4*h)*pulse);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1+0.5*h),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // vignette
    const vg=ctx.createRadialGradient(LW/2,LH/2,LH*0.35,LW/2,LH/2,LH*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,LW,LH);
  }
};

/* =========================================================================
   PARTICLES + SCREEN SHAKE + FLOATING TEXT
   ========================================================================= */
const FX = {
  parts:[], rings:[], floats:[], shake:0, flash:0, flashCol:'#fff',
  burst(x,y,color,count=16,speed=320){
    if(reducedMotion) count=Math.min(count,8);
    for(let i=0;i<count;i++){
      const a=rand(0,Math.PI*2), s=rand(speed*0.3,speed);
      const isSpark = Math.random()<0.35;
      this.parts.push({
        x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
        life:1, col:color, r:rand(2.5,5.5),
        spark:isSpark, spin:rand(-8,8), rot:rand(0,Math.PI*2),
        grav: 520
      });
    }
  },
  /* Add a single expanding ring shockwave. */
  ring(x,y,color,maxR=140,width=6,life=0.5){
    if(reducedMotion && this.rings.length>2) return;
    this.rings.push({x,y,col:color,r:4,maxR,wd:width,life:1,maxLife:life});
  },
  /* Combo milestone fireworks: several rings + sparks. */
  fireworks(x,y,color){
    this.ring(x,y,color,180,8,0.55);
    this.ring(x,y,'#ffffff',90,4,0.35);
    this.burst(x,y,color,22,420);
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      this.parts.push({
        x,y,vx:Math.cos(a)*260,vy:Math.sin(a)*260,
        life:1,col:'#ffffff',r:3,spark:true,spin:0,rot:0,grav:300
      });
    }
  },
  float(str,x,y,color,size=44){ this.floats.push({str,x,y,vy:-70,life:1,col:color,size}); },
  hit(amt){ if(!reducedMotion) this.shake=Math.min(this.shake+amt,28); },
  bang(col){ this.flash=0.6; this.flashCol=col; },
  update(dt){
    for(const p of this.parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt; p.vx*=0.97; p.life-=dt*1.6; if(p.spin) p.rot+=p.spin*dt; }
    this.parts=this.parts.filter(p=>p.life>0);
    for(const r of this.rings){ r.life -= dt/r.maxLife; }
    this.rings = this.rings.filter(r=>r.life>0);
    for(const f of this.floats){ f.y+=f.vy*dt; f.vy*=0.92; f.life-=dt*0.9; }
    this.floats=this.floats.filter(f=>f.life>0);
    this.shake*=Math.pow(0.001,dt);
    this.flash=Math.max(0,this.flash-dt*1.8);
  },
  drawParts(){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(const p of this.parts){
      const a=clamp(p.life,0,1);
      if(p.spark){
        // elongated streak spark
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(Math.atan2(p.vy,p.vx));
        const len = p.r*3.5*p.life;
        const rg = ctx.createLinearGradient(-len,0,len,0);
        rg.addColorStop(0, hexA(p.col,0));
        rg.addColorStop(0.5, hexA(p.col,a));
        rg.addColorStop(1, hexA('#ffffff',a*0.8));
        ctx.fillStyle = rg;
        ctx.fillRect(-len, -p.r*0.4*p.life, len*2, p.r*0.8*p.life);
        ctx.restore();
      } else {
        // soft glow disc with bright core
        const rg = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4*p.life);
        rg.addColorStop(0, hexA(p.col, a));
        rg.addColorStop(0.4, hexA(p.col, a*0.5));
        rg.addColorStop(1, hexA(p.col, 0));
        ctx.fillStyle = rg;
        ctx.fillRect(p.x-p.r*4, p.y-p.r*4, p.r*8, p.r*8);
        ctx.fillStyle = hexA('#ffffff', a*0.8);
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.6*p.life,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
    // rings (also additive)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(const r of this.rings){
      const t = 1-r.life; // 0..1
      const rad = lerp(4, r.maxR, easeOutExpo(t));
      const a = r.life * 0.9;
      ctx.strokeStyle = hexA(r.col, a);
      ctx.lineWidth = r.wd * r.life;
      ctx.beginPath(); ctx.arc(r.x, r.y, rad, 0, Math.PI*2); ctx.stroke();
      // inner faint ring
      ctx.strokeStyle = hexA('#ffffff', a*0.3);
      ctx.lineWidth = r.wd*r.life*0.4;
      ctx.beginPath(); ctx.arc(r.x, r.y, rad*0.92, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  },
  drawFloats(){
    for(const f of this.floats){
      const a = clamp(f.life,0,1);
      ctx.save();
      // soft glow behind text
      ctx.globalCompositeOperation='lighter';
      ctx.font = `900 ${f.size}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hexA(f.col, a*0.35);
      for(let r=1;r<=3;r++){ ctx.fillText(f.str, f.x, f.y); } // multiple draws = glow
      ctx.restore();
      ctx.globalAlpha=a;
      text(f.str,f.x,f.y,f.size,f.col,'center',900);
      ctx.globalAlpha=1;
    }
  }
};

/* =========================================================================
   INPUT
   ========================================================================= */
let pointer={x:-999,y:-999,down:false};
function toLogical(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  return { x:(clientX-r.left-ox)/scale, y:(clientY-r.top-oy)/scale };
}
function onDown(cx,cy){
  Audio_.init(); Audio_.resume();
  const p=toLogical(cx,cy); pointer.x=p.x; pointer.y=p.y; pointer.down=true;
  Game.pointerDown(p.x,p.y);
}
function onMove(cx,cy){ const p=toLogical(cx,cy); pointer.x=p.x; pointer.y=p.y; }
function onUp(){ pointer.down=false; }
canvas.addEventListener('pointerdown',e=>{e.preventDefault();onDown(e.clientX,e.clientY);},{passive:false});
canvas.addEventListener('pointermove',e=>{onMove(e.clientX,e.clientY);});
canvas.addEventListener('pointerup',e=>{onUp();});
canvas.addEventListener('pointercancel',onUp);
window.addEventListener('keydown',e=>{
  // Detect keyboard presence so we can show key hints (desktop). Touch devices never fire keydown.
  Game.hasKeyboard = true;
  const k = e.key;
  if((k===' '||k==='Enter') && Game.state!=='play'){ Game.keyConfirm(); return; }
  // Picker: digits 1-9 + a/b/c select games 1-12 directly
  if(Game.state==='picker'){
    let idx=-1;
    if(k>='1'&&k<='9') idx=parseInt(k,10)-1;
    else if(k==='0') idx=9;
    else if(k==='q'||k==='Q') idx=10;
    else if(k==='w'||k==='W') idx=11;
    if(idx>=0 && idx<GAMES.length){ e.preventDefault(); Game.startPractice(GAMES[idx]); return; }
  }
  if(Game.state==='play' && Game.current && Game.current.keyFor){
    // Map digits 1-6 to the option list each game exposes via keyFor(i)
    if(k>='1' && k<='6'){
      const idx = parseInt(k,10)-1;
      const pos = Game.current.keyFor(idx);
      if(pos){ e.preventDefault(); Game.current.down(pos.x, pos.y); return; }
    }
  }
  if(Game.state==='play'){
    // SpeedMatch uses Y/N
    if(k==='y'||k==='Y'){ if(Game.current.keyFor){ const p=Game.current.keyFor(0); if(p){Game.current.down(p.x,p.y); return;} } }
    if(k==='n'||k==='N'){ if(Game.current.keyFor){ const p=Game.current.keyFor(1); if(p){Game.current.down(p.x,p.y); return;} } }
  }
  if((k==='p'||k==='P'||k==='Escape') && (Game.state==='play'||Game.state==='paused')){
    Game.togglePause(); e.preventDefault();
  }
});

/* button hit helper */
function btn(b){ return pointer.x>=b.x&&pointer.x<=b.x+b.w&&pointer.y>=b.y&&pointer.y<=b.y+b.h; }
function inBtn(b,x,y){ return x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h; }

/* --- 1. MATH RUSH --- */
const MathRush = {
  name:'MATH RUSH', hint:'Tap the correct answer',
  domains:['speed'], accent:COL.cyan,
  init(){ this.level=0; this.dailySeed=0; this.newProblem(); this.shownAt=now(); },
  newProblem(){
    const rng = makeRNG(this.dailySeed);
    const rr = (a,b)=> a + Math.floor(rng()*(b-a+1));
    const pickS = arr => arr[Math.floor(rng()*arr.length)];
    const lv=this.level;
    let a,b,op,ans,q;
    if(lv<3){ a=rr(2,12); b=rr(2,12); op=pickS(['+','-']); }
    else if(lv<7){ a=rr(3,15); b=rr(2,12); op=pickS(['+','-','×']); }
    else { a=rr(6,19); b=rr(3,14); op=pickS(['+','-','×']); }
    if(op==='-'&&b>a){ [a,b]=[b,a]; }
    ans = op==='+'?a+b : op==='-'?a-b : a*b;
    q=`${a} ${op} ${b}`;
    const opts=new Set([ans]);
    while(opts.size<4){
      let d = ans + rr(-6,6) + (rng()<0.3?rr(-1,1)*10:0);
      if(op==='×') d = ans + rr(-3,3)*rr(1,b) ;
      if(d!==ans && d>=0 && d<400) opts.add(d);
    }
    const sarr = [...opts];
    if(this.dailySeed){ for(let i=sarr.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [sarr[i],sarr[j]]=[sarr[j],sarr[i]]; } }
    else shuffle(sarr);
    this.q=q; this.ans=ans; this.opts=sarr; this.shownAt=now();
  },
  update(){}, 
  draw(){
    // question with soft glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.font = `800 96px ${MONO}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = hexA(COL.cyan, 0.18);
    for(let r=0;r<3;r++) ctx.fillText(this.q, LW/2, 470);
    ctx.restore();
    text(this.q, LW/2, 470, 96, COL.mist, 'center', 800, MONO);
    const bw=300,bh=120,gap=24, sx=LW/2-bw-gap/2, sy=640;
    this._boxes=[];
    for(let i=0;i<4;i++){
      const x=sx+(i%2)*(bw+gap), y=sy+Math.floor(i/2)*(bh+gap);
      this._boxes.push({x,y,w:bw,h:bh,val:this.opts[i]});
      panel(x,y,bw,bh,20,{
        fill0:COL.blue, fill1:COL.void, fillA:0.42,
        stroke:COL.cyan, strokeA:0.45, glow:14, glowCol:COL.cyan
      });
      text(String(this.opts[i]), x+bw/2, y+bh/2, 58, COL.mist,'center',800,MONO);
    }
  },
  down(x,y){
    if(!this._boxes) return;
    for(const b of this._boxes){
      if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){
        const rt=now()-this.shownAt;
        pressAt(b, COL.cyan);
        if(b.val===this.ans){
          Game.award(true,rt,120);
          FX.burst(b.x+b.w/2,b.y+b.h/2,COL.cyan,18);
          FX.ring(b.x+b.w/2,b.y+b.h/2,COL.cyan,120,6,0.4);
          if(Game.combo%5===0&&Game.combo>0) this.level++;
          this.level=Math.min(this.level+0,12);
          this.level++;
          this.level=Math.min(this.level,12);
          this.newProblem();
        } else {
          Game.award(false,rt,0);
          FX.burst(b.x+b.w/2,b.y+b.h/2,COL.magenta,12,200);
          FX.ring(b.x+b.w/2,b.y+b.h/2,COL.magenta,100,5,0.4);
          this.level=Math.max(0,this.level-1);
          this.newProblem();
        }
        return;
      }
    }
  },
  keyFor(i){ const b=this._boxes&&this._boxes[i]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:null; }
};

/* --- 2. COLOR CLASH (Stroop) --- */

    else shuffle(sarr);
