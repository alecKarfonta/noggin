# Static Noggin game server.
# The app is a single self-contained HTML file (synapse.html).
# /health is a synthetic 200 for k8s probes and the deploy verify step.

server {
    listen 31019 default_server;
    listen [::]:31019 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Force Content-Type so nginx doesn't add a second octet-stream header.
    types {
        text/html html;
        text/plain txt;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri =404;
    }
}
